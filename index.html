<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="이피캠텍 영업팀"/>
<title>이피캠텍 국내외영업팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{--bp:#fff;--bs:#f7f7f5;--bt:#f0efeb;--tp:#1a1a1a;--ts:#666660;--tt:#999994;--bl:rgba(0,0,0,.10);--bm:rgba(0,0,0,.18);--rm:8px;--rl:12px;--rx:16px;}
@media(prefers-color-scheme:dark){:root{--bp:#1c1c1e;--bs:#2c2c2e;--bt:#3a3a3c;--tp:#f2f2f7;--ts:#aeaeb2;--tt:#636366;--bl:rgba(255,255,255,.10);--bm:rgba(255,255,255,.18);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bt);}
body,input,select,textarea,button{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tp);}
input,select,textarea{background:var(--bp);border:0.5px solid var(--bm);border-radius:var(--rm);padding:7px 10px;width:100%;font-size:13px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#534AB7;}
textarea{resize:none;}button{cursor:pointer;}
.shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;}
.hdr{background:var(--bp);padding:env(safe-area-inset-top,12px) 14px 9px;border-bottom:0.5px solid var(--bl);flex-shrink:0;}
.hdr-r{display:flex;justify-content:space-between;align-items:center;}
.htitle{font-size:13px;font-weight:600;}
.hsub{font-size:10px;color:var(--tt);margin-top:1px;}
.upill{display:flex;align-items:center;gap:5px;font-size:11px;padding:5px 11px;border-radius:20px;background:var(--bs);border:0.5px solid var(--bl);cursor:pointer;}
.udot{width:8px;height:8px;border-radius:50%;}
.tabbar{display:flex;background:var(--bp);border-bottom:0.5px solid var(--bl);flex-shrink:0;}
.tab{flex:1;padding:7px 0;text-align:center;font-size:10px;color:var(--tt);border-bottom:2px solid transparent;line-height:1.4;}
.tab.on{color:var(--tp);border-bottom:2px solid var(--tp);font-weight:600;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pane{display:none;padding:12px 12px calc(12px + env(safe-area-inset-bottom,0px));}
.pane.on{display:block;}
.card{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);padding:12px;margin-bottom:9px;}
.fl{margin-bottom:7px;}.fl label{font-size:11px;color:var(--ts);display:block;margin-bottom:2px;}
.r2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
.slbl{font-size:11px;font-weight:600;color:var(--tp);margin:9px 0 6px;display:flex;align-items:center;gap:4px;}
.div{border:none;border-top:0.5px solid var(--bl);margin:8px 0;}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px;}
.tbtn{padding:7px 4px;border:0.5px solid var(--bl);border-radius:var(--rm);background:var(--bp);text-align:center;font-size:10px;color:var(--ts);}
.tbtn i{display:block;font-size:14px;margin-bottom:2px;}
.tbtn.sel{border:1.5px solid var(--tp);color:var(--tp);background:var(--bs);}
.pbtn{width:100%;padding:10px;background:var(--tp);color:var(--bp);border:none;border-radius:var(--rm);font-size:13px;font-weight:600;margin-top:8px;}
.pbtn2{width:100%;padding:8px;background:none;border:0.5px solid var(--bm);border-radius:var(--rm);font-size:11px;color:var(--ts);display:flex;align-items:center;justify-content:center;gap:4px;margin-top:5px;}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;margin-top:3px;margin-right:2px;}
.t-미팅{background:#E6F1FB;color:#0C447C;}.t-통화{background:#EAF3DE;color:#27500A;}
.t-이메일{background:#FAEEDA;color:#633806;}.t-견적{background:#EEEDFE;color:#3C3489;}
.t-제안서{background:#FBEAF0;color:#72243E;}.t-제출파일{background:#E1F5EE;color:#085041;}
.t-중식{background:#FFF9C4;color:#F57F17;}.t-석식{background:#FCE4EC;color:#880E4F;}.t-일정{background:#E8F5E9;color:#1B5E20;}
.hcard{background:#E6F1FB;color:#0C447C;padding:2px 7px;border-radius:20px;font-size:10px;display:inline-flex;align-items:center;gap:3px;margin-top:3px;}
.fitem{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);margin-bottom:9px;overflow:hidden;}
.fhdr{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:0.5px solid var(--bl);}
.fbody{padding:9px 12px;}
.ffoot{padding:5px 12px;border-top:0.5px solid var(--bl);display:flex;gap:10px;}
.fbtn{background:none;border:none;font-size:11px;color:var(--ts);display:flex;align-items:center;gap:3px;padding:4px 0;}
.lbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#EAF3DE;color:#27500A;padding:2px 8px;border-radius:20px;}
.ldot{width:5px;height:5px;border-radius:50%;background:#639922;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.citm{display:flex;gap:6px;margin-bottom:6px;}
.cav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.cmeta{font-size:10px;color:var(--tt);margin-bottom:1px;}.ctxt{font-size:11px;line-height:1.5;}
.crow{display:flex;gap:5px;margin-top:8px;align-items:flex-end;}
.crow textarea{font-size:11px;height:32px;flex:1;}
.csend{background:var(--tp);color:var(--bp);border:none;border-radius:var(--rm);padding:6px 10px;font-size:11px;flex-shrink:0;}
.arow{display:flex;align-items:center;gap:5px;padding:8px 10px;border:0.5px dashed var(--bm);border-radius:var(--rm);font-size:11px;color:var(--ts);margin-bottom:6px;}
.cform{background:var(--bs);border-radius:var(--rm);padding:9px;margin-bottom:7px;border:0.5px solid var(--bm);}
.szone{border:0.5px dashed var(--bm);border-radius:var(--rm);overflow:hidden;margin-bottom:8px;}
.sbtns{display:flex;}
.shalf{flex:1;padding:14px 8px;text-align:center;border:none;background:var(--bs);font-size:11px;color:var(--ts);display:flex;flex-direction:column;align-items:center;gap:4px;}
.shalf:first-child{border-right:0.5px solid var(--bl);}
.shalf i{font-size:22px;color:var(--tt);}
.aibox{background:var(--bs);border-radius:var(--rm);padding:10px;margin-bottom:8px;border:0.5px solid var(--bm);}
.pf{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--bl);}
.pf:last-child{border-bottom:none;}
.pfic{width:18px;text-align:center;flex-shrink:0;color:var(--tt);font-size:12px;}
.pflb{font-size:10px;color:var(--tt);width:44px;flex-shrink:0;}
.pfvl{font-size:12px;flex:1;min-width:0;}
.pfin{font-size:12px;flex:1;min-width:0;border:0.5px solid var(--bm);border-radius:4px;padding:2px 6px;background:var(--bp);width:100%;}
.cf{font-size:10px;padding:1px 5px;border-radius:20px;flex-shrink:0;}
.ch{background:#EAF3DE;color:#27500A;}.cm{background:#FAEEDA;color:#633806;}.cl{background:#FCEBEB;color:#A32D2D;}
.pgbar{height:4px;background:var(--bt);border-radius:2px;overflow:hidden;margin:6px 0;}
.pgfill{height:100%;background:#534AB7;border-radius:2px;transition:width .3s;}
.vzone{border:0.5px dashed var(--bm);border-radius:var(--rm);padding:16px;text-align:center;margin-bottom:8px;cursor:pointer;}
.vzone.active{border-color:#639922;background:#EAF3DE;}
.vzone i{font-size:28px;color:var(--tt);display:block;margin-bottom:6px;}
.mzone{border:0.5px dashed var(--bm);border-radius:var(--rm);padding:14px;text-align:center;cursor:pointer;margin-bottom:8px;}
.mzone.active{border-color:#BA7517;background:#FAEEDA;}
.att-glbl{font-size:10px;font-weight:600;color:var(--tt);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.att-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.att-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--bl);background:var(--bp);font-size:11px;font-weight:600;cursor:pointer;}
.att-cust{display:flex;gap:5px;margin-top:4px;}
.att-cust input{flex:1;font-size:12px;padding:5px 9px;border-radius:20px;}
.att-cust button{background:none;border:0.5px solid var(--bm);border-radius:20px;padding:5px 10px;font-size:11px;color:var(--ts);white-space:nowrap;}
.att-sel{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.att-si{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.att-sx{background:none;border:none;font-size:10px;cursor:pointer;opacity:.65;padding:0;}
.att-dv{border:none;border-top:0.5px dashed var(--bl);margin:8px 0;}
.cgrid{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);overflow:hidden;margin-bottom:9px;}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--bl);}
.cdow span{text-align:center;font-size:10px;color:var(--tt);padding:5px 0;}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);}
.cday{min-height:44px;border-right:0.5px solid var(--bl);border-bottom:0.5px solid var(--bl);padding:3px;cursor:pointer;}
.cday:nth-child(7n){border-right:none;}.cday.empty{background:var(--bt);}
.cday.today .cnum{background:var(--tp);color:var(--bp);border-radius:50%;}
.cday.sel{background:#EEF2FF;}
.cnum{font-size:10px;width:17px;height:17px;display:flex;align-items:center;justify-content:center;}
.cnum.sun{color:#E24B4A;}
.cdots{display:flex;gap:2px;flex-wrap:wrap;margin-top:1px;}.cdot{width:4px;height:4px;border-radius:50%;}
.dpanel{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);padding:10px 12px;}
.cfilterbar{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;margin-bottom:8px;}
.cfilterbar::-webkit-scrollbar{display:none;}
.cfinner{display:flex;gap:5px;min-width:max-content;}
.cfbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:0.5px solid var(--bm);background:var(--bp);font-size:11px;color:var(--ts);cursor:pointer;}
.cfbtn.on{font-weight:600;}
.imppanel{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);overflow:hidden;margin-bottom:9px;}
.imphdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--bl);background:#FFFDE7;}
.impitem{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:0.5px solid var(--bl);cursor:pointer;}
.impitem:last-child{border-bottom:none;}.impitem:hover{background:var(--bs);}
.impnum{width:18px;height:18px;border-radius:50%;background:#F57F17;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.d-day{background:#FCEBEB;color:#A32D2D;}.d-near{background:#FAEEDA;color:#633806;}
.d-soon{background:#EAF3DE;color:#27500A;}.d-far{background:var(--bs);color:var(--ts);}.d-past{background:var(--bs);color:var(--tt);}
.starbtn{background:none;border:none;font-size:15px;padding:2px;cursor:pointer;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto;}
.modal{background:var(--bp);border-radius:var(--rx);width:100%;max-width:400px;margin:auto;overflow:hidden;}
.mhdr{padding:10px 13px;border-bottom:0.5px solid var(--bl);display:flex;justify-content:space-between;align-items:center;}
.mbody{padding:13px;max-height:72vh;overflow-y:auto;}
.xbtn{background:none;border:none;font-size:15px;color:var(--ts);padding:2px 4px;}
.zbar{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:4px 0 7px;}
.zbtn{background:none;border:0.5px solid var(--bm);border-radius:var(--rm);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ts);}
.zpct{font-size:11px;color:var(--tt);min-width:36px;text-align:center;}
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:9px;}
.scard{background:var(--bs);border-radius:var(--rm);padding:10px;}
.addcli{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--bp);border:1px dashed #534AB7;border-radius:var(--rl);font-size:12px;font-weight:600;color:#534AB7;cursor:pointer;margin-bottom:9px;}
.cswatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.cswatch.sel{border-color:var(--tp);box-shadow:0 0 0 1px var(--tp);}
.spulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#534AB7;animation:sp .8s infinite;}
@keyframes sp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.dglbl{font-size:10px;color:var(--tt);margin:6px 0 3px;font-weight:500;}
.twrap{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
.toast{background:var(--tp);color:var(--bp);padding:8px 18px;border-radius:24px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity .25s;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.toast.show{opacity:1;}
.urow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bl);}
.urow:last-child{border-bottom:none;}
.unin{flex:1;font-size:13px;background:var(--bs);border:0.5px solid var(--bm);border-radius:var(--rm);padding:5px 8px;}
.urin{width:52px;font-size:12px;background:var(--bs);border:0.5px solid var(--bm);border-radius:var(--rm);padding:5px 6px;}
</style>
</head>
<body>
<div class="shell">
<div class="hdr">
  <div class="hdr-r">
    <div><div class="htitle"><i class="ti ti-briefcase" style="font-size:12px;vertical-align:-2px;margin-right:3px;"></i>이피캠텍 국내외영업팀</div><div class="hsub">영업 활동 관리 시스템</div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
      <div class="upill" onclick="openUserModal()"><div class="udot" id="cudot"></div><span id="culbl">김용진 차장</span><i class="ti ti-chevron-down" style="font-size:10px;opacity:.5;"></i></div>
    </div>
  </div>
</div>
<div class="tabbar">
  <div class="tab on" onclick="go('feed')"><i class="ti ti-layout-list" style="font-size:11px;"></i><br>피드</div>
  <div class="tab" onclick="go('log')"><i class="ti ti-plus" style="font-size:11px;"></i><br>기록</div>
  <div class="tab" onclick="go('clients')"><i class="ti ti-building" style="font-size:11px;"></i><br>고객사</div>
  <div class="tab" onclick="go('cal')"><i class="ti ti-calendar" style="font-size:11px;"></i><br>캘린더</div>
  <div class="tab" onclick="go('stats')"><i class="ti ti-chart-bar" style="font-size:11px;"></i><br>통계</div>
</div>
<div class="scroll">

<!-- FEED -->
<div id="pane-feed" class="pane on">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
    <span style="font-size:13px;font-weight:600;">팀 영업 피드</span>
    <span class="lbadge"><span class="ldot"></span>팀 공유</span>
  </div>
  <div id="feed-list"></div>
</div>

<!-- LOG -->
<div id="pane-log" class="pane">
<div class="card">
  <div class="tgrid">
    <button class="tbtn sel" onclick="selT(this,'미팅')"><i class="ti ti-users"></i>고객 미팅</button>
    <button class="tbtn" onclick="selT(this,'통화')"><i class="ti ti-phone"></i>통화</button>
    <button class="tbtn" onclick="selT(this,'이메일')"><i class="ti ti-mail"></i>이메일</button>
    <button class="tbtn" onclick="selT(this,'견적')"><i class="ti ti-file-invoice"></i>견적</button>
    <button class="tbtn" onclick="selT(this,'제안서')"><i class="ti ti-file-description"></i>제안서</button>
    <button class="tbtn" onclick="selT(this,'제출파일')"><i class="ti ti-file-upload"></i>제출파일</button>
  </div>
  <div class="r2">
    <div class="fl"><label>날짜</label><input type="date" id="l-date"/></div>
    <div class="fl"><label>고객사</label><select id="l-csel" onchange="onCsel()"><option value="">-- 선택 --</option></select></div>
  </div>
  <div class="fl"><label>직접 입력</label><input type="text" id="l-client" placeholder="또는 직접 입력"/></div>
  <div id="l-cbar" style="display:none;height:3px;border-radius:2px;margin-bottom:7px;"></div>
  <div class="fl"><label>메모</label><textarea id="l-memo" placeholder="내용 메모..." style="height:44px;"></textarea></div>
  <!-- 음성 회의록 (미팅) -->
  <div id="voice-sec" style="display:none;">
    <div class="div"></div>
    <div class="slbl"><i class="ti ti-microphone" style="font-size:12px;color:#534AB7;"></i>음성 파일 → AI 회의록 <span style="font-size:10px;color:var(--tt);font-weight:400;">선택</span></div>
    <div class="vzone" id="vzone" onclick="document.getElementById('vfile').click()">
      <i class="ti ti-file-music"></i>
      <div style="font-size:12px;color:var(--ts);" id="vlabel">음성 파일 업로드 (mp3, m4a, wav)</div>
      <input type="file" id="vfile" accept="audio/*" style="display:none;" onchange="onVoice(this)"/>
    </div>
    <div id="vprog" style="display:none;"><div class="pgbar"><div class="pgfill" id="vpfill" style="width:0%"></div></div><div style="font-size:10px;color:var(--tt);text-align:center;" id="vpstep">분석 중...</div></div>
    <div id="vresult"></div>
  </div>
  <!-- 메일 사진 (이메일) -->
  <div id="mail-sec" style="display:none;">
    <div class="div"></div>
    <div class="slbl"><i class="ti ti-photo" style="font-size:12px;color:#BA7517;"></i>메일 사진 첨부 <span style="font-size:10px;color:var(--tt);font-weight:400;">선택</span></div>
    <div class="mzone" id="mzone" onclick="document.getElementById('mfile').click()">
      <i class="ti ti-mail" style="font-size:24px;color:var(--tt);display:block;margin-bottom:5px;"></i>
      <div style="font-size:12px;color:var(--ts);" id="mlabel">메일 화면 캡처 또는 사진 업로드</div>
      <input type="file" id="mfile" accept="image/*" multiple style="display:none;" onchange="onMail(this)"/>
    </div>
    <div id="mthumbs" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;"></div>
  </div>
  <!-- 참석자 (미팅) -->
  <div id="att-sec" style="display:none;">
    <div class="div"></div>
    <div class="slbl"><i class="ti ti-users-group" style="font-size:12px;color:#378ADD;"></i>참석자 등록</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button id="mtype-c" class="att-chip" style="background:#E6F1FB;color:#0C447C;border-color:#90CAF9;" onclick="setMT('client')"><i class="ti ti-building" style="font-size:11px;"></i>고객사 미팅</button>
      <button id="mtype-i" class="att-chip" onclick="setMT('internal')"><i class="ti ti-home" style="font-size:11px;"></i>내부 미팅</button>
    </div>
    <div style="margin-bottom:10px;">
      <div class="att-glbl"><i class="ti ti-building-skyscraper" style="font-size:11px;color:#534AB7;"></i>이피캠텍 참석자</div>
      <div class="att-chips" id="ep-chips"></div>
      <div class="att-cust"><input id="ep-in" placeholder="직접 입력 (이름 + 직급)"/><button onclick="addAC('ep')"><i class="ti ti-plus" style="font-size:11px;vertical-align:-1px;"></i> 추가</button></div>
      <div class="att-sel" id="ep-sel"></div>
    </div>
    <div id="ca-grp" style="display:block;">
      <div class="att-dv"></div>

function lum(h){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;}catch(e){return 200;}}

function getDiff(ds){if(!ds)return null;const t=new Date(ds+'T00:00:00');const tod=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.round((t-tod)/86400000);}
function fmtKo(ds){if(!ds)return '';const d=new Date(ds+'T00:00:00');return `${String(d.getFullYear()).slice(2)}년 ${d.getMonth()+1}월 ${d.getDate()}일`;}
function dBadge(diff){if(diff===null)return '';if(diff<0)return `<span class="dbadge d-past">D+${Math.abs(diff)}</span>`;if(diff===0)return `<span class="dbadge d-day">D-DAY</span>`;if(diff<=3)return `<span class="dbadge d-near">D-${diff}</span>`;if(diff<=14)return `<span class="dbadge d-soon">D-${diff}</span>`;return `<span class="dbadge d-far">D-${diff}</span>`;}

function rImpPanel(){
  const st=[];
  acts.forEach(a=>{if(starred.has('act:'+a.id))st.push({id:a.id,type:'act',date:a.date,title:a.client+(a.type?' ('+a.type+')':''),cat:a.type,client:a.client});});
  calEvts.forEach(e=>{if(starred.has('evt:'+e.id))st.push({id:e.id,type:'evt',date:e.date,title:e.title,cat:e.cat,client:e.client||''});});
  st.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const cnt=document.getElementById('imp-cnt');if(cnt)cnt.textContent=st.length?`(${st.length}건)`:'';
  const el=document.getElementById('imp-list');if(!el)return;
  if(!st.length){el.innerHTML='<div style="padding:10px 12px;font-size:11px;color:var(--tt);text-align:center;"><i class="ti ti-star" style="font-size:16px;display:block;margin-bottom:4px;color:var(--tt);"></i>별표(★)한 일정이 없습니다<br><span style="font-size:10px;">캘린더에서 일정 옆 ★ 탭으로 등록</span></div>';return;}
  el.innerHTML=st.map((item,idx)=>{const diff=getDiff(item.date);const ci=catI(item.cat);const p2=item.client?gcp(item.client):null;
    return `<div class="impitem" onclick="${item.type==='act'?`openActM(${item.id})`:`openEvtM(${item.id})`};selDay('${item.date}')">
      <div class="impnum">${idx+1}</div>
      <div style="width:5px;height:24px;border-radius:3px;background:${p2?p2.border:ci.color};flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;"><div style="font-size:10px;color:var(--tt);margin-bottom:1px;">${fmtKo(item.date)}${item.client?` · <span style="color:${p2?p2.text:'#888'};">${item.client}</span>`:''}</div>
      <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title}</div></div>
      ${dBadge(diff)}
      <button class="starbtn" onclick="event.stopPropagation();togStar(${item.id},'${item.type}')" style="color:#F57F17;">★</button>
    </div>`;}).join('');
  el.style.display=impColl?'none':'block';}

function mCal(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  const fl=calF==='ALL'?'통합 전체':calF;
  document.getElementById('callbl').textContent=`${calY}년 ${calM+1}월 — ${fl}`;
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),tStr=now.toISOString().slice(0,10);
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dA=calF==='ALL'?acts.filter(a=>a.date===ds):acts.filter(a=>a.date===ds&&(a.client===calF||a.client.includes(calF)||calF.includes(a.client)));
    const dE=calF==='ALL'?calEvts.filter(e=>e.date===ds):calEvts.filter(e=>e.date===ds&&(!e.client||e.client===calF||e.client.includes(calF)||calF.includes(e.client)));
    const all=[...dA.map(a=>({type:'act',cat:a.type,id:a.id})),...dE.map(e=>({type:'evt',cat:e.cat,id:e.id}))];
    const dow=(first+d-1)%7;
    const hasS=all.some(it=>(it.type==='act'&&starred.has('act:'+it.id))||(it.type==='evt'&&starred.has('evt:'+it.id)));
    const dots=all.slice(0,4).map(it=>`<div class="cdot" style="background:${catI(it.cat).color};"></div>`).join('');
    html+=`<div class="cday${ds===tStr?' today':''}${ds===selDate?' sel':''}" onclick="selDay('${ds}')" style="${hasS?'background:linear-gradient(135deg,#FFFDE7 0%,var(--bp) 60%);':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;"><div class="cnum${dow===0?' sun':''}">${d}</div>${hasS?`<span style="font-size:8px;color:#F57F17;line-height:1;">★</span>`:''}</div>
      ${dots?`<div class="cdots">${dots}</div>`:''}
      ${all.length>4?`<div style="font-size:8px;color:var(--tt);text-align:right;">+${all.length-4}</div>`:''}
    </div>`;}
  document.getElementById('cdays').innerHTML=html;
  if(selDate)renderDP(selDate);}

function selDay(ds){selDate=ds;renderCal();renderDP(ds);}

function renderDP(ds){
  const el=document.getElementById('dpanel');
  const dA=calF==='ALL'?acts.filter(a=>a.date===ds):acts.filter(a=>a.date===ds&&(a.client===calF||a.client.includes(calF)||calF.includes(a.client)));
  const dE=calF==='ALL'?calEvts.filter(e=>e.date===ds):calEvts.filter(e=>e.date===ds&&(!e.client||e.client===calF||e.client.includes(calF)||calF.includes(e.client)));
  const d=new Date(ds+'T00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const total=dA.length+dE.length;
  const p2=calF!=='ALL'?gcp(calF):null;
  const cb=p2?`<span style="font-size:9px;background:${p2.shades[0]};color:${p2.text};border:0.5px solid ${p2.border};border-radius:20px;padding:1px 6px;margin-left:4px;">${calF}</span>`:'';
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:11px;font-weight:600;">${d}${total?' · '+total+'건':''}${cb}</span>
    <button onclick="openAddEvtM('${ds}')" style="background:#534AB7;color:#fff;border:none;border-radius:var(--rm);padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;"><i class="ti ti-plus" style="font-size:11px;"></i> 일정 추가</button>
  </div>`;
  if(!total)html+='<div style="font-size:11px;color:var(--tt);text-align:center;padding:10px;">이 날 활동이 없습니다</div>';
  dE.forEach(e=>{const ci=catI(e.cat);const lA=e.actId?acts.find(a=>a.id===e.actId):null;
    html+=`<div style="display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:var(--rm);background:${ci.bg};border:0.5px solid ${ci.color};margin-bottom:5px;cursor:pointer;" onclick="${lA&&lA.minutes?`openMinM(${lA.id})`:`openEvtM(${e.id})`}">
      <div style="width:8px;height:8px;border-radius:50%;background:${ci.color};flex-shrink:0;margin-top:3px;"></div>
      <div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:4px;"><span class="tag t-${e.cat}" style="margin-top:0;">${e.cat}</span>${lA&&lA.minutes?`<span style="font-size:9px;background:#EAF3DE;color:#27500A;padding:1px 5px;border-radius:20px;"><i class="ti ti-file-text" style="font-size:9px;"></i> 회의록</span>`:''}</div>
      <div style="font-size:11px;font-weight:600;color:${ci.color};margin-top:2px;">${e.title}</div><div style="font-size:10px;color:${ci.color};opacity:.75;">${e.user||''}${e.client?' · '+e.client:''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <button onclick="event.stopPropagation();togStar(${e.id},'evt')" class="starbtn" style="color:${starred.has('evt:'+e.id)?'#F57F17':'var(--tt)'};">${starred.has('evt:'+e.id)?'★':'☆'}</button>
        <button onclick="event.stopPropagation();delEvt(${e.id})" style="background:none;border:none;font-size:12px;color:${ci.color};opacity:.5;padding:2px;"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;});
  dA.forEach(a=>{const p=gcp(a.client);
    html+=`<div style="display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:var(--rm);background:${p.shades[0]};border:0.5px solid ${p.border};margin-bottom:5px;cursor:pointer;" onclick="${a.minutes?`openMinM(${a.id})`:`openActM(${a.id})`}">
      <div style="width:8px;height:8px;border-radius:50%;background:${p.border};flex-shrink:0;margin-top:3px;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:4px;"><span class="tag t-${a.type}" style="margin-top:0;">${a.type}</span>
          ${(a.mailImages&&a.mailImages.length)?`<span onclick="event.stopPropagation();openMV(0,acts.find(x=>x.id===${a.id}).mailImages)" style="font-size:9px;background:#FAEEDA;color:#633806;padding:1px 5px;border-radius:20px;cursor:pointer;"><i class="ti ti-photo" style="font-size:9px;"></i> 사진 ${a.mailImages.length}장</span>`:''}
          ${a.minutes?`<span style="font-size:9px;background:#EAF3DE;color:#27500A;padding:1px 5px;border-radius:20px;"><i class="ti ti-file-text" style="font-size:9px;"></i> 회의록 탭</span>`:''}
        </div>
        <div style="font-size:11px;font-weight:600;color:${p.text};margin-top:2px;">${a.client}</div>
        ${a.memo?`<div style="font-size:10px;color:${p.text};opacity:.75;">${a.memo.slice(0,30)}${a.memo.length>30?'...':''}</div>`:''}
        ${a.attendees&&(a.attendees.ep.length+a.attendees.ca.length)>0?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;">${[...a.attendees.ep,...a.attendees.ca,...(a.attendees.ia||[])].slice(0,3).map(name=>{const u2=gUbyN(name);return `<span style="font-size:9px;background:${u2.bg||'#EEEDFE'};color:${u2.color||'#534AB7'};border-radius:20px;padding:1px 5px;font-weight:600;">${name.split(' ')[0]}</span>`;}).join('')}</div>`:''}
        <div style="font-size:10px;color:${p.text};opacity:.65;margin-top:2px;">${a.user||''}</div>
      </div>
      <button onclick="event.stopPropagation();togStar(${a.id},'act')" class="starbtn" style="color:${starred.has('act:'+a.id)?'#F57F17':'var(--tt)'};">${starred.has('act:'+a.id)?'★':'☆'}</button>
    </div>`;});
  el.innerHTML=html;}

/* ADD EVENT */
function openAddEvtM(ds){window._evCat=CATS[0].key;
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhdr"><div style="font-size:13px;font-weight:600;"><i class="ti ti-calendar-plus" style="font-size:12px;vertical-align:-1px;color:#534AB7;margin-right:4px;"></i>일정 추가</div><button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="mbody">
      <div class="fl"><label>날짜</label><input type="date" id="ev-date" value="${ds}"/></div>
      <div class="fl"><label>업체 (선택)</label><select id="ev-cli"><option value="">-- 선택 (선택사항) --</option>${allCli().map(n=>`<option value="${n}"${calF!=='ALL'&&calF===n?' selected':''}>${n}</option>`).join('')}</select></div>
      <div class="fl"><label>카테고리</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;" id="ev-cats">
          ${CATS.map((c,i)=>`<div onclick="selEvC(this,'${c.key}')" data-cat="${c.key}" style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;background:${c.bg};border:${i===0?'1.5px solid '+c.color:'1.5px solid transparent'};cursor:pointer;font-size:12px;font-weight:600;color:${c.color};"><i class="ti ${c.icon}" style="font-size:13px;"></i>${c.label}</div>`).join('')}
        </div>
      </div>
      <div class="fl"><label>제목 / 내용</label><input type="text" id="ev-title" placeholder="예) Samsung SDI 중식 미팅"/></div>
      <div class="fl"><label>메모 (선택)</label><textarea id="ev-memo" placeholder="추가 메모..." style="height:44px;"></textarea></div>
      <button class="pbtn" onclick="addEvt('${ds}')">일정 저장</button>
    </div>
  </div></div>`;}
function selEvC(el,key){window._evCat=key;document.querySelectorAll('[data-cat]').forEach(b=>{const ci=catI(b.dataset.cat);b.style.border=b.dataset.cat===key?`1.5px solid ${ci.color}`:'1.5px solid transparent';});}
function addEvt(dds){const date=document.getElementById('ev-date').value||dds;const title=document.getElementById('ev-title').value.trim();const memo=document.getElementById('ev-memo').value.trim();const cat=window._evCat||'일정';const cli=document.getElementById('ev-cli')?document.getElementById('ev-cli').value:'';if(!title){toast('제목을 입력해 주세요');return;}const u=curU();calEvts.push({id:Date.now(),date,cat,title:title+(memo?' — '+memo:''),user:ud(u),userColor:u.color,actId:null,client:cli||null});sEvts();closeModal();renderCal();selDay(date);toast('일정이 추가됐습니다 ✓');}
function openEvtM(eid){const e=calEvts.find(x=>x.id===eid);if(!e)return;const ci=catI(e.cat);
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhdr" style="background:${ci.bg};"><div><div style="font-size:12px;font-weight:600;color:${ci.color};">${e.title}</div><div style="font-size:10px;color:${ci.color};opacity:.75;">${e.date}${e.client?' · '+e.client:''} · ${e.user||''}</div></div><button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="mbody">
      <div style="display:flex;align-items:center;gap:8px;padding:10px;background:${ci.bg};border-radius:var(--rm);margin-bottom:10px;">
        <i class="ti ${ci.icon}" style="font-size:20px;color:${ci.color};"></i>
        <div><div style="font-size:13px;font-weight:600;color:${ci.color};">${ci.label}</div><div style="font-size:11px;color:${ci.color};opacity:.75;">${e.date}${e.client?' · '+e.client:''}</div></div>
      </div>
      <button onclick="delEvt(${e.id});closeModal();renderCal();if(selDate)renderDP(selDate);" class="pbtn2" style="color:#A32D2D;border-color:#F09595;"><i class="ti ti-trash" style="font-size:12px;vertical-align:-1px;"></i> 일정 삭제</button>
    </div>
  </div></div>`;}
function delEvt(eid){calEvts=calEvts.filter(e=>e.id!==eid);sEvts();renderCal();if(selDate)renderDP(selDate);toast('삭제됐습니다');}

/* STATS */
function renderStats(){
  const total=acts.length,ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisM=acts.filter(a=>a.date&&a.date.startsWith(ym)).length;
  const totalCmt=acts.reduce((s,a)=>s+(a.comments||[]).length,0);
  const totalMins=acts.filter(a=>a.minutes).length;
  const totalMail=acts.reduce((s,a)=>s+(a.mailImages?a.mailImages.length:0),0);
  document.getElementById('sgrid').innerHTML=`
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">전체 활동</div><div style="font-size:20px;font-weight:600;">${total}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">이번 달</div><div style="font-size:20px;font-weight:600;">${thisM}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">팀 댓글</div><div style="font-size:20px;font-weight:600;">${totalCmt}</div></div>
    <div class="scard" style="background:#EAF3DE;"><div style="font-size:10px;color:#27500A;margin-bottom:2px;"><i class="ti ti-file-text" style="font-size:10px;"></i> 회의록</div><div style="font-size:20px;font-weight:600;color:#1B5E20;">${totalMins}</div></div>
    <div class="scard" style="background:#FAEEDA;"><div style="font-size:10px;color:#633806;margin-bottom:2px;"><i class="ti ti-photo" style="font-size:10px;"></i> 메일사진</div><div style="font-size:20px;font-weight:600;color:#BA7517;">${totalMail}</div></div>
    <div class="scard" style="background:#EEEDFE;"><div style="font-size:10px;color:#3C3489;margin-bottom:2px;"><i class="ti ti-star-filled" style="font-size:10px;color:#F57F17;"></i> 중요일정</div><div style="font-size:20px;font-weight:600;color:#534AB7;">${starred.size}</div></div>`;
  const cc={};acts.forEach(a=>{cc[a.client]=(cc[a.client]||0)+1;});
  const sc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8);const maxC=sc.length?sc[0][1]:1;
  document.getElementById('cbar').innerHTML=sc.map(([n,cnt])=>{const p=gcp(n);return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="font-size:10px;color:var(--ts);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</span><div style="flex:1;height:7px;background:var(--bs);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxC*100)}%;height:100%;background:${p.border};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--ts);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--tt);">활동 없음</div>';
  const uc={};acts.forEach(a=>{uc[a.user||'?']=(uc[a.user||'?']||0)+1;});
  const su=Object.entries(uc).sort((a,b)=>b[1]-a[1]);const maxU=su.length?su[0][1]:1;
  document.getElementById('ubar').innerHTML=su.map(([n,cnt])=>{const u=gUbyN(n);return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><div style="width:14px;height:14px;border-radius:50%;background:${u.bg||'#eee'};border:0.5px solid ${u.color||'#888'};flex-shrink:0;"></div><span style="font-size:10px;color:var(--ts);width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</span><div style="flex:1;height:7px;background:var(--bs);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxU*100)}%;height:100%;background:${u.color||'#888'};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--ts);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--tt);">활동 없음</div>';}

/* NAV */
function go(tab){
  const tabs=['feed','log','clients','cal','stats'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',tabs[i]===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  const p=document.getElementById('pane-'+tab);if(p)p.classList.add('on');
  closeModal();
  if(tab==='feed')renderFeed();
  if(tab==='clients')renderClients();
  if(tab==='cal'){rCalLegend();renderCal();}
  if(tab==='stats')renderStats();}
function closeModal(){document.getElementById('modal-area').innerHTML='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* INIT */
setTimeout(()=>{rEpChips();rIaChips();},100);
renderFeed();rCalLegend();renderCal();
</script>
</body>
</html>
