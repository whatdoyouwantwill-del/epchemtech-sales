<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="이피캠텍 영업팀"/>
<meta name="theme-color" content="#ffffff"/>
<title>이피캠텍 국내외영업팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f7f7f5;--bg-tertiary:#f0efeb;
  --text-primary:#1a1a1a;--text-secondary:#666660;--text-tertiary:#999994;
  --border-light:rgba(0,0,0,0.10);--border-mid:rgba(0,0,0,0.18);
  --radius-md:8px;--radius-lg:12px;--radius-xl:16px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#3a3a3c;
    --text-primary:#f2f2f7;--text-secondary:#aeaeb2;--text-tertiary:#636366;
    --border-light:rgba(255,255,255,0.10);--border-mid:rgba(255,255,255,0.18);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg-tertiary);}
body,input,select,textarea,button{font-family:var(--font-sans);}
input,select,textarea{background:var(--bg-primary);color:var(--text-primary);border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:7px 10px;width:100%;font-size:13px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#534AB7;}
textarea{resize:none;}
button{cursor:pointer;}

/* ── APP SHELL ── */
.app-shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg-tertiary);}
.hdr{background:var(--bg-primary);padding:env(safe-area-inset-top,12px) 14px 9px;border-bottom:0.5px solid var(--border-light);flex-shrink:0;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:13px;font-weight:600;color:var(--text-primary);}
.hdr-sub{font-size:10px;color:var(--text-tertiary);margin-top:1px;}
.user-pill{display:flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg-secondary);border:0.5px solid var(--border-light);color:var(--text-secondary);}
.gcal-pill{display:flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border-light);color:var(--text-secondary);margin-top:4px;}
.gcal-pill.on{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}

.tab-bar{display:flex;background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);flex-shrink:0;}
.tab{flex:1;padding:7px 0 calc(7px + env(safe-area-inset-bottom,0px)/2);text-align:center;font-size:10px;color:var(--text-tertiary);border-bottom:2px solid transparent;line-height:1.4;}
.tab.on{color:var(--text-primary);border-bottom:2px solid var(--text-primary);font-weight:600;}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pane{display:none;padding:12px 12px calc(12px + env(safe-area-inset-bottom,0px));}
.pane.on{display:block;}

/* ── COMPONENTS ── */
.card{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);padding:12px;margin-bottom:9px;}
.fl{margin-bottom:7px;}
.fl label{font-size:11px;color:var(--text-secondary);display:block;margin-bottom:2px;}
.row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text-primary);margin:9px 0 6px;display:flex;align-items:center;gap:4px;}
.divider{border:none;border-top:0.5px solid var(--border-light);margin:8px 0;}

.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px;}
.tbtn{padding:8px 4px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);text-align:center;font-size:10px;color:var(--text-secondary);}
.tbtn i{display:block;font-size:15px;margin-bottom:2px;}
.tbtn.sel{border:1.5px solid var(--text-primary);color:var(--text-primary);background:var(--bg-secondary);}

.pbtn{width:100%;padding:10px;background:var(--text-primary);color:var(--bg-primary);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:600;margin-top:8px;}
.sbtn{width:100%;padding:8px;background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);font-size:11px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;gap:4px;margin-top:5px;}

/* tags */
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;margin-top:3px;margin-right:2px;}
.t-미팅{background:#E6F1FB;color:#0C447C;}.t-통화{background:#EAF3DE;color:#27500A;}
.t-이메일{background:#FAEEDA;color:#633806;}.t-견적{background:#EEEDFE;color:#3C3489;}
.t-제안서{background:#FBEAF0;color:#72243E;}.t-제출파일{background:#E1F5EE;color:#085041;}
.has-min{display:inline-flex;align-items:center;gap:2px;font-size:10px;background:#EAF3DE;color:#27500A;padding:2px 6px;border-radius:20px;margin-top:3px;margin-right:2px;}
.has-card{display:inline-flex;align-items:center;gap:2px;font-size:10px;background:#EEEDFE;color:#3C3489;padding:2px 6px;border-radius:20px;margin-top:3px;margin-right:2px;}

/* feed */
.feed-item{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);margin-bottom:9px;overflow:hidden;}
.feed-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:0.5px solid var(--border-light);}
.feed-body{padding:9px 12px;}
.feed-foot{padding:5px 12px;border-top:0.5px solid var(--border-light);display:flex;gap:10px;}
.feed-btn{background:none;border:none;font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:3px;padding:4px 0;}
.live-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#EAF3DE;color:#27500A;padding:2px 8px;border-radius:20px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#639922;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* comments */
.comment-item{display:flex;gap:6px;margin-bottom:6px;}
.c-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.c-meta{font-size:10px;color:var(--text-tertiary);margin-bottom:1px;}
.c-text{font-size:11px;color:var(--text-primary);line-height:1.5;}
.cmt-row{display:flex;gap:5px;margin-top:8px;align-items:flex-end;}
.cmt-row textarea{font-size:11px;height:32px;flex:1;}
.cmt-send{background:var(--text-primary);color:var(--bg-primary);border:none;border-radius:var(--radius-md);padding:6px 10px;font-size:11px;flex-shrink:0;}

/* contact cards */
.add-row{display:flex;align-items:center;gap:5px;padding:8px 10px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);font-size:11px;color:var(--text-secondary);margin-bottom:6px;}
.cform{background:var(--bg-secondary);border-radius:var(--radius-md);padding:9px;margin-bottom:7px;border:0.5px solid var(--border-mid);}

/* scan */
.scan-zone{border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;}
.scan-btns{display:flex;}
.scan-half{flex:1;padding:14px 8px;text-align:center;border:none;background:var(--bg-secondary);font-size:11px;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:4px;}
.scan-half:first-child{border-right:0.5px solid var(--border-light);}
.scan-half i{font-size:22px;color:var(--text-tertiary);}
.ai-preview{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;margin-bottom:8px;border:0.5px solid var(--border-mid);}
.ai-phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ai-ptitle{font-size:11px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:4px;}
.ai-edit-btn{background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:3px 7px;font-size:10px;color:var(--text-secondary);}
.pfield{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--border-light);}
.pfield:last-child{border-bottom:none;}
.pfield-icon{width:18px;text-align:center;flex-shrink:0;color:var(--text-tertiary);font-size:12px;}
.pfield-lbl{font-size:10px;color:var(--text-tertiary);width:44px;flex-shrink:0;}
.pfield-val{font-size:12px;color:var(--text-primary);flex:1;min-width:0;}
.pfield-input{font-size:12px;flex:1;min-width:0;border:0.5px solid var(--border-mid);border-radius:4px;padding:2px 6px;background:var(--bg-primary);color:var(--text-primary);width:100%;}
.conf{font-size:10px;padding:1px 5px;border-radius:20px;flex-shrink:0;}
.ch{background:#EAF3DE;color:#27500A;}.cm{background:#FAEEDA;color:#633806;}.cl{background:#FCEBEB;color:#A32D2D;}
.prog-bar{height:4px;background:var(--bg-tertiary);border-radius:2px;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;background:#534AB7;border-radius:2px;transition:width 0.3s;}

/* calendar */
.cal-grid{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);overflow:hidden;margin-bottom:9px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border-light);}
.cal-dow span{text-align:center;font-size:10px;color:var(--text-tertiary);padding:5px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cday{min-height:38px;border-right:0.5px solid var(--border-light);border-bottom:0.5px solid var(--border-light);padding:3px;cursor:pointer;}
.cday:nth-child(7n){border-right:none;}
.cday.empty{background:var(--bg-tertiary);}
.cday.today .cnum{background:var(--text-primary);color:var(--bg-primary);border-radius:50%;}
.cday.sel{background:#E6F1FB;}
.cnum{font-size:10px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}
.cnum.sun{color:#E24B4A;}
.cdots{display:flex;gap:2px;flex-wrap:wrap;margin-top:1px;}
.cdot{width:4px;height:4px;border-radius:50%;}
.day-panel{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);padding:10px 12px;}

/* client list */
.cli-card{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);margin-bottom:8px;overflow:hidden;cursor:pointer;}

/* stats */
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:9px;}
.scard{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px;}

/* modal overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.modal{background:var(--bg-primary);border-radius:var(--radius-xl);width:100%;max-width:400px;overflow:hidden;margin:auto;}
.modal-hdr{padding:10px 13px;border-bottom:0.5px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:13px;max-height:70vh;overflow-y:auto;}
.xbtn{background:none;border:none;font-size:16px;color:var(--text-secondary);padding:2px 4px;}

.empty-state{text-align:center;padding:32px 16px;color:var(--text-tertiary);font-size:12px;}
.empty-state i{font-size:28px;display:block;margin-bottom:8px;}
.dg-lbl{font-size:10px;color:var(--text-tertiary);margin:7px 0 3px;font-weight:500;}
.toast-wrap{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
.toast{background:var(--text-primary);color:var(--bg-primary);padding:8px 18px;border-radius:24px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity 0.25s;box-shadow:0 4px 16px rgba(0,0,0,0.18);}
.toast.show{opacity:1;}

.chip-bar{display:flex;gap:4px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;}
.chip-bar::-webkit-scrollbar{display:none;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--border-light);background:var(--bg-primary);color:var(--text-secondary);white-space:nowrap;}
.chip.on{background:var(--text-primary);color:var(--bg-primary);}
</style>
</head>
<body>

<div class="app-shell">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title"><i class="ti ti-briefcase" style="font-size:12px;vertical-align:-2px;margin-right:3px;"></i>이피캠텍 국내외영업팀</div>
        <div class="hdr-sub">영업 활동 관리 시스템</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
        <div class="user-pill" onclick="cycleUser()"><i class="ti ti-user" style="font-size:11px;"></i><span id="cur-user-lbl">김영업</span></div>
        <div class="gcal-pill" id="gcal-pill" onclick="toggleGcal()"><i class="ti ti-brand-google" style="font-size:11px;"></i><span id="gcal-lbl">캘린더 연동</span></div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab on" onclick="go('feed')"><i class="ti ti-layout-list" style="font-size:11px;"></i><br>피드</div>
    <div class="tab" onclick="go('log')"><i class="ti ti-plus" style="font-size:11px;"></i><br>기록</div>
    <div class="tab" onclick="go('clients')"><i class="ti ti-building" style="font-size:11px;"></i><br>고객사</div>
    <div class="tab" onclick="go('cal')"><i class="ti ti-calendar" style="font-size:11px;"></i><br>캘린더</div>
    <div class="tab" onclick="go('stats')"><i class="ti ti-chart-bar" style="font-size:11px;"></i><br>통계</div>
  </div>

  <div class="scroll-area">

    <!-- 피드 -->
    <div id="pane-feed" class="pane on">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
        <span style="font-size:13px;font-weight:600;color:var(--text-primary);">팀 영업 피드</span>
        <span class="live-badge"><span class="live-dot"></span>실시간 공유</span>
      </div>
      <div id="feed-list"></div>
    </div>

    <!-- 기록 -->
    <div id="pane-log" class="pane">
      <div class="card">
        <div class="type-grid">
          <button class="tbtn sel" onclick="selT(this,'미팅')"><i class="ti ti-users"></i>고객 미팅</button>
          <button class="tbtn" onclick="selT(this,'통화')"><i class="ti ti-phone"></i>전화/통화</button>
          <button class="tbtn" onclick="selT(this,'이메일')"><i class="ti ti-mail"></i>이메일 발송</button>
          <button class="tbtn" onclick="selT(this,'견적')"><i class="ti ti-file-invoice"></i>견적</button>
          <button class="tbtn" onclick="selT(this,'제안서')"><i class="ti ti-file-description"></i>제안서</button>
          <button class="tbtn" onclick="selT(this,'제출파일')"><i class="ti ti-file-upload"></i>제출파일</button>
        </div>
        <div class="row2">
          <div class="fl"><label>날짜</label><input type="date" id="l-date"/></div>
          <div class="fl"><label>고객사</label><select id="l-csel" onchange="onCsel()"><option value="">-- 선택 --</option></select></div>
        </div>
        <div class="fl"><label>직접 입력</label><input type="text" id="l-client" placeholder="또는 직접 입력"/></div>
        <div id="l-color-bar" style="display:none;height:3px;border-radius:2px;margin-bottom:7px;"></div>
        <div class="fl"><label>메모</label><textarea id="l-memo" placeholder="내용 메모..." style="height:48px;"></textarea></div>
        <div id="gcal-row" style="display:none;margin-bottom:6px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--text-secondary);">
            <div id="g-toggle" onclick="tSync()" style="width:30px;height:17px;border-radius:9px;background:#378ADD;position:relative;flex-shrink:0;">
              <div id="g-dot" style="width:11px;height:11px;border-radius:50%;background:#fff;position:absolute;top:3px;left:16px;transition:left 0.15s;"></div>
            </div>
            <i class="ti ti-brand-google" style="color:#378ADD;font-size:11px;"></i> 구글 캘린더 등록
          </label>
        </div>
        <div class="divider"></div>
        <div class="sec-lbl"><i class="ti ti-id-badge-2" style="font-size:12px;color:#534AB7;"></i>담당자 등록 <span style="font-size:10px;color:var(--text-tertiary);font-weight:400;">명함 스캔 또는 직접 입력</span></div>

        <!-- 명함 스캔 -->
        <div class="scan-zone" id="scan-zone">
          <div class="scan-btns">
            <button class="scan-half" onclick="document.getElementById('card-cam').click()">
              <i class="ti ti-camera"></i>
              <span style="font-size:11px;font-weight:600;">카메라 촬영</span>
              <span style="font-size:10px;color:var(--text-tertiary);">명함을 찍어주세요</span>
            </button>
            <button class="scan-half" onclick="document.getElementById('card-gal').click()">
              <i class="ti ti-photo"></i>
              <span style="font-size:11px;font-weight:600;">갤러리 선택</span>
              <span style="font-size:10px;color:var(--text-tertiary);">사진 불러오기</span>
            </button>
          </div>
          <input type="file" id="card-cam" accept="image/*" capture="environment" style="display:none;" onchange="onCardImage(this)"/>
          <input type="file" id="card-gal" accept="image/*" style="display:none;" onchange="onCardImage(this)"/>
        </div>

        <div id="ai-prog-area" style="display:none;">
          <div class="ai-preview">
            <div style="text-align:center;padding:10px 0;">
              <i class="ti ti-scan" style="font-size:22px;color:#534AB7;"></i>
              <div style="font-size:11px;color:var(--text-secondary);margin:5px 0;" id="ai-step">명함 이미지 분석 중...</div>
              <div class="prog-bar"><div class="prog-fill" id="ai-prog" style="width:0%;"></div></div>
              <div style="font-size:10px;color:var(--text-tertiary);" id="ai-pct">0%</div>
            </div>
          </div>
        </div>

        <div id="ai-result-area" style="display:none;">
          <div class="ai-preview">
            <div class="ai-phdr">
              <div class="ai-ptitle"><i class="ti ti-sparkles" style="font-size:12px;color:#534AB7;"></i>AI 인식 결과 <span style="font-size:10px;font-weight:400;color:var(--text-tertiary);">수정 후 등록</span></div>
              <button class="ai-edit-btn" id="edit-btn" onclick="toggleEdit()"><i class="ti ti-edit" style="font-size:10px;vertical-align:-1px;"></i> 수정</button>
            </div>
            <div id="ai-view"></div>
            <div id="ai-edit" style="display:none;"></div>
            <div style="display:flex;gap:6px;margin-top:9px;">
              <button onclick="confirmContact()" style="flex:1;padding:8px;background:#534AB7;color:#fff;border:none;border-radius:var(--radius-md);font-size:12px;font-weight:600;"><i class="ti ti-check" style="font-size:11px;vertical-align:-1px;"></i> 담당자로 등록</button>
              <button onclick="resetScan()" style="padding:8px 11px;background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);font-size:11px;color:var(--text-secondary);"><i class="ti ti-refresh" style="font-size:11px;"></i></button>
            </div>
          </div>
        </div>

        <div id="contact-list"></div>
        <div id="cform-area"></div>
        <div class="add-row" onclick="showCForm()"><i class="ti ti-pencil" style="font-size:12px;"></i> 직접 입력으로 담당자 추가</div>
        <button class="pbtn" onclick="addAct()">활동 기록 + 팀 피드 공유</button>
      </div>
    </div>

    <!-- 고객사 -->
    <div id="pane-clients" class="pane">
      <div class="fl"><input type="text" id="cli-search" placeholder="고객사 검색..." oninput="renderClients()"/></div>
      <div id="client-wrap"></div>
    </div>

    <!-- 캘린더 -->
    <div id="pane-cal" class="pane">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">

function gcp(n){if(!n)return DP;if(CP[n])return CP[n];for(const k of Object.keys(CP))if(n.includes(k)||k.includes(n))return CP[k];return DP;}
function lum(h){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;}catch(e){return 200;}}

/* ── 명함 AI 스캔 ── */
function onCardImage(inp){
  if(!inp.files||!inp.files[0])return;
  const reader=new FileReader();
  reader.onload=()=>startAI();
  reader.readAsDataURL(inp.files[0]);
}
function startAI(){
  document.getElementById('ai-prog-area').style.display='block';
  document.getElementById('ai-result-area').style.display='none';
  document.getElementById('scan-zone').style.display='none';
  let p=0,si=0;
  const steps=['이미지 전처리 중...','텍스트 영역 감지 중...','OCR 문자 인식 중...','필드 분류 AI 적용 중...','완료!'];
  const iv=setInterval(()=>{
    p+=Math.floor(Math.random()*16)+7;if(p>99)p=99;
    document.getElementById('ai-prog').style.width=p+'%';
    document.getElementById('ai-pct').textContent=p+'%';
    if(si<steps.length-1&&p>si*23){document.getElementById('ai-step').textContent=steps[si];si++;}
  },420);
  setTimeout(()=>{
    clearInterval(iv);
    document.getElementById('ai-prog').style.width='100%';
    document.getElementById('ai-pct').textContent='100%';
    document.getElementById('ai-step').textContent='완료!';
    setTimeout(()=>{
      document.getElementById('ai-prog-area').style.display='none';
      scannedData=JSON.parse(JSON.stringify(DEMO_CARDS[demoIdx%DEMO_CARDS.length]));
      demoIdx++;
      renderAIFields(false);
      document.getElementById('ai-result-area').style.display='block';
      isEditMode=false;
    },300);
  },2600);
}
function confCls(c){return c==='high'?'ch':c==='med'?'cm':'cl';}
function confLbl(c){return c==='high'?'정확':c==='med'?'보통':'확인';}
function renderAIFields(editMode){
  const d=scannedData;
  const view=document.getElementById('ai-view');
  const edit=document.getElementById('ai-edit');
  if(!editMode){
    view.style.display='block';edit.style.display='none';
    view.innerHTML=FIELD_DEFS.map(f=>{
      const c=d.confidence?d.confidence[f.k]:'high';
      return `<div class="pfield"><div class="pfield-icon"><i class="ti ${f.icon}"></i></div><div class="pfield-lbl">${f.label}</div><div class="pfield-val">${d[f.k]||'—'}</div><span class="conf ${confCls(c)}">${confLbl(c)}</span></div>`;
    }).join('');
    document.getElementById('edit-btn').innerHTML='<i class="ti ti-edit" style="font-size:10px;vertical-align:-1px;"></i> 수정';
  } else {
    view.style.display='none';edit.style.display='block';
    edit.innerHTML=FIELD_DEFS.map(f=>`<div class="pfield"><div class="pfield-icon"><i class="ti ${f.icon}"></i></div><div class="pfield-lbl">${f.label}</div><input class="pfield-input" id="ef-${f.k}" value="${(d[f.k]||'').replace(/"/g,'&quot;')}"/></div>`).join('');
    document.getElementById('edit-btn').innerHTML='<i class="ti ti-check" style="font-size:10px;vertical-align:-1px;"></i> 확인';
  }
}
function toggleEdit(){
  isEditMode=!isEditMode;
  if(!isEditMode)FIELD_DEFS.forEach(f=>{const el=document.getElementById('ef-'+f.k);if(el)scannedData[f.k]=el.value;});
  renderAIFields(isEditMode);
}
function confirmContact(){
  if(isEditMode)FIELD_DEFS.forEach(f=>{const el=document.getElementById('ef-'+f.k);if(el)scannedData[f.k]=el.value;});
  if(!scannedData.name){toast('성함이 인식되지 않았습니다');return;}
  tempContacts.push({name:scannedData.name,title:scannedData.title||'',dept:scannedData.dept||'',email:scannedData.email||'',tel:scannedData.tel||'',fromCard:true});
  renderContacts();resetScan();toast(scannedData.name+' 등록 완료 ✓');
  if(scannedData.company&&!document.getElementById('l-client').value){
    const m=ALL_CLIENTS.find(n=>n.includes(scannedData.company)||scannedData.company.includes(n));
    const val=m||scannedData.company;
    document.getElementById('l-client').value=val;
    if(m)document.getElementById('l-csel').value=m;
    showCBar(val);
  }
}

/* ── 담당자 ── */
function renderContacts(){
  const el=document.getElementById('contact-list');
  const cn=document.getElementById('l-client').value||document.getElementById('l-csel').value;
  const p=gcp(cn);
  if(!tempContacts.length){el.innerHTML='';return;}
  el.innerHTML=tempContacts.map((c,i)=>{
    const sh=p.shades[Math.min(i,p.shades.length-1)];
    const dk=p.shades[Math.min(i+2,p.shades.length-1)];
    const tc=lum(sh)>160?p.text:'#fff';
    return `<div style="background:${sh};border:0.5px solid ${p.border};border-radius:var(--radius-md);margin-bottom:5px;padding:8px 10px;display:flex;align-items:flex-start;gap:7px;">
      <div style="width:28px;height:28px;border-radius:50%;background:${dk};color:${lum(dk)>160?p.text:'#fff'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${(c.name||'?').slice(0,1)}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;">
          <span style="font-size:12px;font-weight:600;color:${tc};">${c.name}</span>
          ${c.title?`<span style="font-size:10px;color:${tc};opacity:0.8;">${c.title}</span>`:''}
          ${c.dept?`<span style="font-size:10px;color:${tc};opacity:0.7;">${c.dept}</span>`:''}
          ${c.fromCard?`<span style="font-size:9px;background:#EEEDFE;color:#3C3489;padding:1px 5px;border-radius:20px;"><i class="ti ti-id-badge-2" style="font-size:9px;"></i>명함</span>`:''}
        </div>
        ${c.tel?`<div style="font-size:10px;color:${tc};opacity:0.75;"><i class="ti ti-phone" style="font-size:10px;"></i> ${c.tel}</div>`:''}
        ${c.email?`<div style="font-size:10px;color:${tc};opacity:0.75;"><i class="ti ti-mail" style="font-size:10px;"></i> ${c.email}</div>`:''}
      </div>
      <button onclick="delContact(${i})" style="background:none;border:none;color:${tc};opacity:0.5;font-size:13px;padding:2px;"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

function addAct(){
  const date=document.getElementById('l-date').value;
  const manual=document.getElementById('l-client').value.trim();

  const memo=document.getElementById('l-memo').value.trim();
  const scanCount=tempContacts.filter(c=>c.fromCard).length;
  acts.unshift({id:Date.now(),type:curType,date,client,contacts:[...tempContacts],memo,gcal:gcalOn&&gcalSync,user:curUser().name,comments:[],scanCount});

/* ── 캘린더 ── */
function mCal(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){
  document.getElementById('cal-lbl').textContent=`${calY}년 ${calM+1}월`;
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),tStr=now.toISOString().slice(0,10);
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const da=acts.filter(a=>a.date===ds),dow=(first+d-1)%7;
    const dots=[...new Map(da.map(a=>[a.client,a])).values()].slice(0,4).map(a=>`<div class="cdot" style="background:${gcp(a.client).border};"></div>`).join('');
    html+=`<div class="cday${ds===tStr?' today':''}${ds===selDate?' sel':''}" onclick="selDay('${ds}')"><div class="cnum${dow===0?' sun':''}">${d}</div>${dots?`<div class="cdots">${dots}</div>`:''}</div>`;
  }
  document.getElementById('cal-days').innerHTML=html;
  if(selDate)renderDayPanel(selDate);
}
function selDay(ds){selDate=ds;renderCal();renderDayPanel(ds);}
function renderDayPanel(ds){
  const el=document.getElementById('day-panel');
  const da=acts.filter(a=>a.date===ds);
  const d=new Date(ds+'T00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  if(!da.length){el.innerHTML=`<div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">${d}</div><div style="font-size:11px;color:var(--text-tertiary);text-align:center;padding:8px;">활동 없음</div>`;return;}
  let html=`<div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-bottom:7px;">${d} · ${da.length}건</div>`;
  da.forEach(a=>{const p=gcp(a.client);html+=`<div style="display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:var(--radius-md);background:${p.shades[0]};border:0.5px solid ${p.border};margin-bottom:5px;cursor:pointer;" onclick="openActModal(${a.id})"><div style="width:5px;height:5px;border-radius:50%;background:${p.border};flex-shrink:0;margin-top:4px;"></div><div style="flex:1;min-width:0;"><div style="font-size:11px;font-weight:600;color:${p.text};">${a.client}</div><div style="font-size:10px;color:${p.text};opacity:0.75;">${a.type} · ${a.user}</div>${pills(a.contacts,a.client)}</div></div>`;});
  el.innerHTML=html;
}

/* ── 통계 ── */
function renderStats(){
  const total=acts.length,ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisMonth=acts.filter(a=>a.date&&a.date.startsWith(ym)).length;
  const totalCmts=acts.reduce((s,a)=>s+(a.comments||[]).length,0);
  const totalScans=acts.reduce((s,a)=>s+(a.scanCount||0),0);
  document.getElementById('sgrid').innerHTML=`
    <div class="scard"><div style="font-size:10px;color:var(--text-secondary);margin-bottom:2px;">전체 활동</div><div style="font-size:20px;font-weight:600;color:var(--text-primary);">${total}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--text-secondary);margin-bottom:2px;">이번 달</div><div style="font-size:20px;font-weight:600;color:var(--text-primary);">${thisMonth}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--text-secondary);margin-bottom:2px;">팀 댓글</div><div style="font-size:20px;font-weight:600;color:var(--text-primary);">${totalCmts}</div></div>
    <div class="scard" style="background:#EEEDFE;"><div style="font-size:10px;color:#3C3489;margin-bottom:2px;"><i class="ti ti-id-badge-2" style="font-size:10px;"></i> 명함 스캔</div><div style="font-size:20px;font-weight:600;color:#3C3489;">${totalScans}</div></div>`;
  const cc={};acts.forEach(a=>{cc[a.client]=(cc[a.client]||0)+1;});
  const sc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxC=sc.length?sc[0][1]:1;
  document.getElementById('client-bar').innerHTML=sc.map(([n,cnt])=>{const p=gcp(n);return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="font-size:10px;color:var(--text-secondary);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</span><div style="flex:1;height:7px;background:var(--bg-secondary);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxC*100)}%;height:100%;background:${p.border};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--text-secondary);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--text-tertiary);">활동 없음</div>';
  const uc={};acts.forEach(a=>{uc[a.user||'?']=(uc[a.user||'?']||0)+1;});
  const su=Object.entries(uc).sort((a,b)=>b[1]-a[1]);
  const maxU=su.length?su[0][1]:1;
  document.getElementById('user-bar').innerHTML=su.map(([n,cnt])=>{const u=USERS.find(x=>x.name===n)||{color:'#888'};return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;"><span style="font-size:10px;color:var(--text-secondary);width:44px;flex-shrink:0;">${n}</span><div style="flex:1;height:7px;background:var(--bg-secondary);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxU*100)}%;height:100%;background:${u.color};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--text-secondary);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--text-tertiary);">활동 없음</div>';
}

/* ── 탭 전환 ── */
function go(tab){
  const tabs=['feed','log','clients','cal','stats'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',tabs[i]===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  const p=document.getElementById('pane-'+tab);if(p)p.classList.add('on');
  closeModal();
  if(tab==='feed')renderFeed();
  if(tab==='clients')renderClients();
  if(tab==='cal')renderCal();
  if(tab==='stats')renderStats();
}
function closeModal(){document.getElementById('modal-area').innerHTML='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ── INIT ── */
renderFeed();renderCal();
</script>
</body>
