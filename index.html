<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="이피캠텍 영업팀"/>
<meta name="theme-color" content="#ffffff"/>
<title>이피캠텍 국내외영업팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bp:#fff;--bs:#f7f7f5;--bt:#f0efeb;
  --tp:#1a1a1a;--ts:#666660;--tt:#999994;
  --bl:rgba(0,0,0,.10);--bm:rgba(0,0,0,.18);
  --rm:8px;--rl:12px;--rx:16px;
  --fn:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{--bp:#1c1c1e;--bs:#2c2c2e;--bt:#3a3a3c;--tp:#f2f2f7;--ts:#aeaeb2;--tt:#636366;--bl:rgba(255,255,255,.10);--bm:rgba(255,255,255,.18);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bt);}
body,input,select,textarea,button{font-family:var(--fn);color:var(--tp);}
input,select,textarea{background:var(--bp);border:0.5px solid var(--bm);border-radius:var(--rm);padding:7px 10px;width:100%;font-size:13px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#534AB7;}
textarea{resize:none;}
button{cursor:pointer;}
.shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bt);}
.hdr{background:var(--bp);padding:env(safe-area-inset-top,12px) 14px 9px;border-bottom:0.5px solid var(--bl);flex-shrink:0;}
.hdr-r{display:flex;justify-content:space-between;align-items:center;}
.htitle{font-size:13px;font-weight:600;color:var(--tp);}
.hsub{font-size:10px;color:var(--tt);margin-top:1px;}
.upill{display:flex;align-items:center;gap:5px;font-size:11px;padding:5px 11px;border-radius:20px;background:var(--bs);border:0.5px solid var(--bl);cursor:pointer;}
.udot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tabbar{display:flex;background:var(--bp);border-bottom:0.5px solid var(--bl);flex-shrink:0;}
.tab{flex:1;padding:7px 0;text-align:center;font-size:10px;color:var(--tt);border-bottom:2px solid transparent;line-height:1.4;}
.tab.on{color:var(--tp);border-bottom:2px solid var(--tp);font-weight:600;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pane{display:none;padding:12px 12px calc(12px + env(safe-area-inset-bottom,0px));}
.pane.on{display:block;}
.card{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);padding:12px;margin-bottom:9px;}
.fl{margin-bottom:7px;}
.fl label,.lbl{font-size:11px;color:var(--ts);display:block;margin-bottom:2px;}
.r2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
.r3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;}
.slbl{font-size:11px;font-weight:600;color:var(--tp);margin:9px 0 6px;display:flex;align-items:center;gap:4px;}
.div{border:none;border-top:0.5px solid var(--bl);margin:8px 0;}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px;}
.tbtn{padding:7px 4px;border:0.5px solid var(--bl);border-radius:var(--rm);background:var(--bp);text-align:center;font-size:10px;color:var(--ts);}
.tbtn i{display:block;font-size:14px;margin-bottom:2px;}
.tbtn.sel{border:1.5px solid var(--tp);color:var(--tp);background:var(--bs);}
.pbtn{width:100%;padding:10px;background:var(--tp);color:var(--bp);border:none;border-radius:var(--rm);font-size:13px;font-weight:600;margin-top:8px;}
.pbtn2{width:100%;padding:8px;background:none;border:0.5px solid var(--bm);border-radius:var(--rm);font-size:11px;color:var(--ts);display:flex;align-items:center;justify-content:center;gap:4px;margin-top:5px;}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;margin-top:3px;margin-right:2px;}
.t-미팅{background:#E6F1FB;color:#0C447C;}.t-통화{background:#EAF3DE;color:#27500A;}
.t-이메일{background:#FAEEDA;color:#633806;}.t-견적{background:#EEEDFE;color:#3C3489;}
.t-제안서{background:#FBEAF0;color:#72243E;}.t-제출파일{background:#E1F5EE;color:#085041;}
.t-중식{background:#FFF9C4;color:#F57F17;}.t-석식{background:#FCE4EC;color:#880E4F;}
.t-일정{background:#E8F5E9;color:#1B5E20;}
.hcard{background:#E6F1FB;color:#0C447C;padding:2px 7px;border-radius:20px;font-size:10px;display:inline-flex;align-items:center;gap:3px;margin-top:3px;}
/* feed */
.fitem{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);margin-bottom:9px;overflow:hidden;}
.fhdr{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:0.5px solid var(--bl);}
.fbody{padding:9px 12px;}
.ffoot{padding:5px 12px;border-top:0.5px solid var(--bl);display:flex;gap:10px;}
.fbtn{background:none;border:none;font-size:11px;color:var(--ts);display:flex;align-items:center;gap:3px;padding:4px 0;}
.lbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:#EAF3DE;color:#27500A;padding:2px 8px;border-radius:20px;}
.ldot{width:5px;height:5px;border-radius:50%;background:#639922;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
/* comment */
.citm{display:flex;gap:6px;margin-bottom:6px;}
.cav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.cmeta{font-size:10px;color:var(--tt);margin-bottom:1px;}
.ctxt{font-size:11px;color:var(--tp);line-height:1.5;}
.crow{display:flex;gap:5px;margin-top:8px;align-items:flex-end;}
.crow textarea{font-size:11px;height:32px;flex:1;}
.csend{background:var(--tp);color:var(--bp);border:none;border-radius:var(--rm);padding:6px 10px;font-size:11px;flex-shrink:0;}
/* contact */
.arow{display:flex;align-items:center;gap:5px;padding:8px 10px;border:0.5px dashed var(--bm);border-radius:var(--rm);font-size:11px;color:var(--ts);margin-bottom:6px;}
.cform{background:var(--bs);border-radius:var(--rm);padding:9px;margin-bottom:7px;border:0.5px solid var(--bm);}
/* scan */
.szone{border:0.5px dashed var(--bm);border-radius:var(--rm);overflow:hidden;margin-bottom:8px;}
.sbtns{display:flex;}
.shalf{flex:1;padding:14px 8px;text-align:center;border:none;background:var(--bs);font-size:11px;color:var(--ts);display:flex;flex-direction:column;align-items:center;gap:4px;}
.shalf:first-child{border-right:0.5px solid var(--bl);}
.shalf i{font-size:22px;color:var(--tt);}
.aibox{background:var(--bs);border-radius:var(--rm);padding:10px;margin-bottom:8px;border:0.5px solid var(--bm);}
.aihdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.aiptitle{font-size:11px;font-weight:600;color:var(--tp);display:flex;align-items:center;gap:4px;}
.aiedit{background:none;border:0.5px solid var(--bm);border-radius:var(--rm);padding:3px 7px;font-size:10px;color:var(--ts);}
.pf{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--bl);}
.pf:last-child{border-bottom:none;}
.pfic{width:18px;text-align:center;flex-shrink:0;color:var(--tt);font-size:12px;}
.pflb{font-size:10px;color:var(--tt);width:44px;flex-shrink:0;}
.pfvl{font-size:12px;color:var(--tp);flex:1;min-width:0;}
.pfin{font-size:12px;flex:1;min-width:0;border:0.5px solid var(--bm);border-radius:4px;padding:2px 6px;background:var(--bp);color:var(--tp);width:100%;}
.cf{font-size:10px;padding:1px 5px;border-radius:20px;flex-shrink:0;}
.ch{background:#EAF3DE;color:#27500A;}.cm{background:#FAEEDA;color:#633806;}.cl{background:#FCEBEB;color:#A32D2D;}
.pgbar{height:4px;background:var(--bt);border-radius:2px;overflow:hidden;margin:6px 0;}
.pgfill{height:100%;background:#534AB7;border-radius:2px;transition:width .3s;}
/* voice upload zone */
.vzone{border:0.5px dashed var(--bm);border-radius:var(--rm);padding:16px;text-align:center;margin-bottom:8px;cursor:pointer;}
.vzone.active{border-color:#639922;background:#EAF3DE;}
.vzone i{font-size:28px;color:var(--tt);display:block;margin-bottom:6px;}
/* minutes modal */
.mmin-body{padding:13px;}
.mmin-sec{margin-bottom:12px;}
.mmin-stitle{font-size:11px;font-weight:600;color:var(--ts);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.mmin-txt{font-size:13px;color:var(--tp);line-height:1.7;}
.ap-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:0.5px solid var(--bl);}
.ap-item:last-child{border-bottom:none;}
.ap-check{width:15px;height:15px;border:0.5px solid var(--bm);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ap-check.done{background:var(--tp);border-color:var(--tp);}
/* calendar */
.cgrid{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);overflow:hidden;margin-bottom:9px;}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--bl);}
.cdow span{text-align:center;font-size:10px;color:var(--tt);padding:5px 0;}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);}
.cday{min-height:44px;border-right:0.5px solid var(--bl);border-bottom:0.5px solid var(--bl);padding:3px;cursor:pointer;position:relative;}
.cday:nth-child(7n){border-right:none;}
.cday.empty{background:var(--bt);}
.cday.today .cnum{background:var(--tp);color:var(--bp);border-radius:50%;}
.cday.sel{background:#EEF2FF;}
.cnum{font-size:10px;width:17px;height:17px;display:flex;align-items:center;justify-content:center;}
.cnum.sun{color:#E24B4A;}
.cdots{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
.cdot{width:5px;height:5px;border-radius:50%;}
.dpanel{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);padding:10px 12px;}
/* cat chips */
.cat-chip{padding:4px 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--bl);background:var(--bp);color:var(--ts);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.cat-chip.sel{font-weight:600;}
/* modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto;}
.modal{background:var(--bp);border-radius:var(--rx);width:100%;max-width:400px;margin:auto;overflow:hidden;}
.mhdr{padding:10px 13px;border-bottom:0.5px solid var(--bl);display:flex;justify-content:space-between;align-items:center;}
.mbody{padding:13px;max-height:72vh;overflow-y:auto;}
.xbtn{background:none;border:none;font-size:15px;color:var(--ts);padding:2px 4px;}
/* stats */
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:9px;}
.scard{background:var(--bs);border-radius:var(--rm);padding:10px;}
/* zoom */
.zoom-bar{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:4px 0 8px;}
.zoom-btn{background:none;border:0.5px solid var(--bm);border-radius:var(--rm);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ts);}
.zoom-pct{font-size:11px;color:var(--tt);min-width:36px;text-align:center;}
.zoomable{transform-origin:top left;transition:transform .2s;}
.empty-st{text-align:center;padding:30px 16px;color:var(--tt);font-size:12px;}
.empty-st i{font-size:26px;display:block;margin-bottom:7px;}
.dglbl{font-size:10px;color:var(--tt);margin:6px 0 3px;font-weight:500;}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.lchip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;}
.twrap{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
.toast{background:var(--tp);color:var(--bp);padding:8px 18px;border-radius:24px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity .25s;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.toast.show{opacity:1;}
/* user modal */
.urow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bl);}
.urow:last-child{border-bottom:none;}
.unin{flex:1;font-size:13px;background:var(--bs);border:0.5px solid var(--bm);border-radius:var(--rm);padding:5px 8px;}
.urin{width:52px;font-size:12px;background:var(--bs);border:0.5px solid var(--bm);border-radius:var(--rm);padding:5px 6px;}

/* ── 캘린더 업체 필터 ── */
.cal-filter-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:8px;}
.cal-filter-bar::-webkit-scrollbar{display:none;}
.cal-filter-inner{display:flex;gap:5px;min-width:max-content;}
.cfilter-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:0.5px solid var(--bm);background:var(--bp);font-size:11px;color:var(--ts);cursor:pointer;white-space:nowrap;transition:all .15s;}
.cfilter-btn.active{font-weight:600;}
.cfilter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── 중요 일정 패널 ── */
.important-panel{background:var(--bp);border-radius:var(--rl);border:0.5px solid var(--bl);overflow:hidden;margin-bottom:9px;}
.imp-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:0.5px solid var(--bl);background:linear-gradient(135deg,#FFF9C4 0%,#FFFDE7 100%);}
.imp-header-dark{display:flex;align-items:center;gap:6px;}
.imp-empty{padding:10px 12px;font-size:11px;color:var(--tt);text-align:center;}
.imp-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:0.5px solid var(--bl);cursor:pointer;}
.imp-item:last-child{border-bottom:none;}
.imp-item:hover{background:var(--bs);}
.imp-num{width:18px;height:18px;border-radius:50%;background:#F57F17;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.imp-info{flex:1;min-width:0;}
.imp-date{font-size:10px;color:var(--tt);margin-bottom:1px;}
.imp-title{font-size:12px;font-weight:600;color:var(--tp);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.d-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.d-today{background:#FCEBEB;color:#A32D2D;}
.d-near{background:#FAEEDA;color:#633806;}
.d-soon{background:#EAF3DE;color:#27500A;}
.d-far{background:var(--bs);color:var(--ts);}
.d-past{background:var(--bs);color:var(--tt);text-decoration:line-through;}
.star-btn{background:none;border:none;font-size:14px;padding:2px;cursor:pointer;transition:transform .15s;}
.star-btn:active{transform:scale(1.3);}
</style>
</head>
<body>
<div class="shell">
<div class="hdr">
  <div class="hdr-r">
    <div>
      <div class="htitle"><i class="ti ti-briefcase" style="font-size:12px;vertical-align:-2px;margin-right:3px;"></i>이피캠텍 국내외영업팀</div>
      <div class="hsub">영업 활동 관리 시스템</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
      <div class="upill" onclick="openUserModal()"><div class="udot" id="cudot"></div><span id="culbl">김용진 차장</span><i class="ti ti-chevron-down" style="font-size:10px;opacity:.5;"></i></div>
    </div>
  </div>
</div>
<div class="tabbar">
  <div class="tab on" onclick="go('feed')"><i class="ti ti-layout-list" style="font-size:11px;"></i><br>피드</div>
  <div class="tab" onclick="go('log')"><i class="ti ti-plus" style="font-size:11px;"></i><br>기록</div>
  <div class="tab" onclick="go('clients')"><i class="ti ti-building" style="font-size:11px;"></i><br>고객사</div>
  <div class="tab" onclick="go('cal')"><i class="ti ti-calendar" style="font-size:11px;"></i><br>캘린더</div>
  <div class="tab" onclick="go('stats')"><i class="ti ti-chart-bar" style="font-size:11px;"></i><br>통계</div>
</div>
<div class="scroll">

<!-- ── 피드 ── -->
<div id="pane-feed" class="pane on">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
    <span style="font-size:13px;font-weight:600;">팀 영업 피드</span>
    <span class="lbadge"><span class="ldot"></span>팀 공유</span>
  </div>
  <div id="feed-list"></div>
</div>

<!-- ── 기록 ── -->
<div id="pane-log" class="pane">
  <div class="card">
    <div class="tgrid">
      <button class="tbtn sel" onclick="selT(this,'미팅')"><i class="ti ti-users"></i>고객 미팅</button>
      <button class="tbtn" onclick="selT(this,'통화')"><i class="ti ti-phone"></i>통화</button>
      <button class="tbtn" onclick="selT(this,'이메일')"><i class="ti ti-mail"></i>이메일</button>
      <button class="tbtn" onclick="selT(this,'견적')"><i class="ti ti-file-invoice"></i>견적</button>
      <button class="tbtn" onclick="selT(this,'제안서')"><i class="ti ti-file-description"></i>제안서</button>
      <button class="tbtn" onclick="selT(this,'제출파일')"><i class="ti ti-file-upload"></i>제출파일</button>
    </div>
    <div class="r2">
      <div class="fl"><label>날짜</label><input type="date" id="l-date"/></div>
      <div class="fl"><label>고객사</label><select id="l-csel" onchange="onCsel()"><option value="">-- 선택 --</option></select></div>
    </div>
    <div class="fl"><label>직접 입력</label><input type="text" id="l-client" placeholder="또는 직접 입력"/></div>
    <div id="l-cbar" style="display:none;height:3px;border-radius:2px;margin-bottom:7px;"></div>
    <div class="fl"><label>메모</label><textarea id="l-memo" placeholder="내용 메모..." style="height:44px;"></textarea></div>

    <!-- 미팅일 때 음성 회의록 업로드 -->
    <div id="voice-section" style="display:none;">
      <div class="div"></div>
      <div class="slbl"><i class="ti ti-microphone" style="font-size:12px;color:#534AB7;"></i>음성 파일로 회의록 자동 생성 <span style="font-size:10px;color:var(--tt);font-weight:400;">선택</span></div>
      <div class="vzone" id="vzone" onclick="document.getElementById('vfile').click()">
        <i class="ti ti-file-music"></i>
        <div style="font-size:12px;color:var(--ts);" id="vlabel">음성 파일을 탭하여 업로드</div>
        <div style="font-size:10px;color:var(--tt);">mp3, m4a, wav 등</div>
        <input type="file" id="vfile" accept="audio/*" style="display:none;" onchange="onVoice(this)"/>
      </div>
      <div id="vprog-area" style="display:none;">
        <div class="pgbar"><div class="pgfill" id="vpfill" style="width:0%"></div></div>
        <div style="font-size:10px;color:var(--tt);text-align:center;" id="vpstep">분석 중...</div>
      </div>
      <div id="vresult-area" style="display:none;"></div>
    </div>

    <!-- 이메일일 때 사진 첨부 -->
    <div id="mail-section" style="display:none;">
      <div class="div"></div>
      <div class="slbl"><i class="ti ti-photo" style="font-size:12px;color:#BA7517;"></i>메일 사진 첨부 <span style="font-size:10px;color:var(--tt);font-weight:400;">이미지로 기록 보존</span></div>
      <div id="mail-upload-zone" onclick="document.getElementById('mail-img-input').click()" style="border:0.5px dashed var(--bm);border-radius:var(--rm);padding:16px;text-align:center;cursor:pointer;margin-bottom:8px;">
        <i class="ti ti-mail" style="font-size:26px;color:var(--tt);display:block;margin-bottom:6px;"></i>

/* ── MAIL IMAGE UPLOAD ── */
function onMailImages(inp){
  if(!inp.files||!inp.files.length)return;
  const files=Array.from(inp.files);
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(e){
      pendingMailImages.push({dataUrl:e.target.result,name:file.name,size:file.size});
      loaded++;
      if(loaded===files.length) renderMailPreviews();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('mail-upload-label').textContent=`${files.length}개 파일 선택됨`;
}
function renderMailPreviews(){
  const el=document.getElementById('mail-preview-list');
  el.innerHTML=pendingMailImages.map((img,i)=>`
    <div style="position:relative;width:72px;height:72px;border-radius:var(--rm);overflow:hidden;border:0.5px solid var(--bm);flex-shrink:0;cursor:pointer;" onclick="previewMailImg(${i})">
      <img src="${img.dataUrl}" style="width:100%;height:100%;object-fit:cover;" alt="메일사진${i+1}"/>
      <button onclick="event.stopPropagation();removeMailImg(${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0;">
        <i class="ti ti-x" style="font-size:9px;color:#fff;"></i>
      </button>
    </div>`).join('');
}
function removeMailImg(i){pendingMailImages.splice(i,1);renderMailPreviews();}
function previewMailImg(i){openMailImgModalFromArr(pendingMailImages,i);}
function openMailImgModalFromArr(imgs,startIdx){

      <div class="mhdr" style="background:#FAEEDA;">
        <div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;color:#633806;"><i class="ti ti-photo" style="font-size:12px;vertical-align:-1px;margin-right:3px;"></i>메일 사진 (${curIdx+1}/${imgs.length})</div><div style="font-size:10px;color:#BA7517;">${img.name||''}</div></div>
        <button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button>

      <div style="padding:6px 13px 0;border-bottom:0.5px solid var(--bl);background:var(--bp);display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;gap:4px;">
          ${imgs.length>1?`<button class="zoom-btn" onclick="window._mailNav(-1)" ${curIdx===0?'disabled style="opacity:.3;"':''}><i class="ti ti-chevron-left" style="font-size:13px;"></i></button>
          <button class="zoom-btn" onclick="window._mailNav(1)" ${curIdx===imgs.length-1?'disabled style="opacity:.3;"':''}><i class="ti ti-chevron-right" style="font-size:13px;"></i></button>`:''}
        </div>
        <div class="zoom-bar" style="padding:4px 0;">
          <button class="zoom-btn" onclick="window._mzoom(-10)"><i class="ti ti-zoom-out" style="font-size:13px;"></i></button>
          <span class="zoom-pct" id="mzpct">${zoom}%</span>
          <button class="zoom-btn" onclick="window._mzoom(10)"><i class="ti ti-zoom-in" style="font-size:13px;"></i></button>
          <button class="zoom-btn" onclick="window._mzoom(0)" style="font-size:10px;font-weight:600;">1:1</button>
        </div>
      </div>
      <div style="overflow:auto;max-height:60vh;background:var(--bs);padding:8px;text-align:center;">

/* ── ADD ACT ── */
function addAct(){
  const date=document.getElementById('l-date').value;
  const manual=document.getElementById('l-client').value.trim();
  const fromSel=csel.value;const client=manual||fromSel;
  if(!client){toast('고객사를 입력해 주세요');return;}
  const memo=document.getElementById('l-memo').value.trim();
  const scanCount=tempContacts.filter(c=>c.fromCard).length;
  const u=curUser();
  const mailImgs=curType==='이메일'?[...pendingMailImages]:[];
  const act={id:Date.now(),type:curType,date,client,contacts:[...tempContacts],memo,user:udisplay(u),userColor:u.color,userBg:u.bg,comments:[],scanCount,minutes:pendingMinutes?JSON.parse(JSON.stringify(pendingMinutes)):null,mailImages:mailImgs};
  acts.unshift(act);saveActs();
  /* 미팅이면 캘린더에도 자동 등록 */
  if(curType==='미팅'||curType==='통화'||curType==='이메일'){
    calEvents.push({id:Date.now()+1,date,cat:curType,title:client+(memo?' — '+memo.slice(0,20):''),user:udisplay(u),userColor:u.color,actId:act.id,client:client});saveCE();
  }
  document.getElementById('l-client').value='';csel.value='';document.getElementById('l-memo').value='';document.getElementById('l-cbar').style.display='none';
  tempContacts=[];renderContacts();resetCard();
  pendingMinutes=null;pendingMailImages=[];document.getElementById('mail-preview-list').innerHTML='';document.getElementById('mail-upload-label').textContent='메일 화면 캡처 또는 사진을 업로드';document.getElementById('mail-section').style.display='none';
  document.getElementById('vresult-area').style.display='none';document.getElementById('vzone').classList.remove('active');document.getElementById('vlabel').textContent='음성 파일을 탭하여 업로드';document.getElementById('voice-section').style.display='none';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));document.querySelector('.tbtn').classList.add('sel');curType='미팅';
  toast('피드에 공유됐습니다 ✓');go('feed');
}

/* ── CALENDAR ── */
/* ── 중요 일정 패널 ── */
function getDDiff(dateStr){
  if(!dateStr)return null;
  const target=new Date(dateStr+'T00:00:00');
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((target-today)/(1000*60*60*24));
}
function dBadge(diff){
  if(diff===null)return '';
  if(diff<0)return `<span class="d-badge d-past">D+${Math.abs(diff)}</span>`;
  if(diff===0)return `<span class="d-badge d-today">D-DAY</span>`;
  if(diff<=3)return `<span class="d-badge d-near">D-${diff}</span>`;
  if(diff<=14)return `<span class="d-badge d-soon">D-${diff}</span>`;
  return `<span class="d-badge d-far">D-${diff}</span>`;
}
function fmtDateKo(dateStr){
  if(!dateStr)return '';
  const d=new Date(dateStr+'T00:00:00');
  return `${String(d.getFullYear()).slice(2)}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function toggleStar(id,type){
  const key=type+':'+id;
  if(starredIds.has(key))starredIds.delete(key);
  else starredIds.add(key);
  saveStarred();
  renderImpPanel();
  renderCal();
  if(selDate)renderDayPanel(selDate);
}
function toggleImpPanel(){
  impCollapsed=!impCollapsed;
  document.getElementById('imp-list').style.display=impCollapsed?'none':'block';
  document.getElementById('imp-toggle-btn').textContent=impCollapsed?'펼치기▼':'접기 ▲';
}
function renderImpPanel(){
  /* 별표된 활동 + 이벤트 수집 */
  const starred=[];
  acts.forEach(a=>{if(starredIds.has('act:'+a.id))starred.push({id:a.id,type:'act',date:a.date,title:a.client+(a.type?' ('+a.type+')':''),cat:a.type,client:a.client});});
  calEvents.forEach(e=>{if(starredIds.has('evt:'+e.id))starred.push({id:e.id,type:'evt',date:e.date,title:e.title,cat:e.cat,client:e.client||''});});
  /* 날짜 오름차순 정렬 */
  starred.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const badge=document.getElementById('imp-count-badge');
  if(badge)badge.textContent=starred.length?`(${starred.length}건)`:'';

  const listEl=document.getElementById('imp-list');
  if(!listEl)return;
  if(!starred.length){listEl.innerHTML='<div class="imp-empty"><i class="ti ti-star" style="font-size:16px;display:block;margin-bottom:4px;color:var(--tt);"></i>별표(★)한 일정이 없습니다<br><span style="font-size:10px;">캘린더 날짜 패널에서 일정 옆 ★을 탭하세요</span></div>';return;}
  listEl.innerHTML=starred.map((item,idx)=>{
    const diff=getDDiff(item.date);
    const ci=catInfo(item.cat)||{color:'#888',bg:'#eee'};
    const p=item.client?gcp(item.client):null;
    return `<div class="imp-item" onclick="${item.type==='act'?`openActModal(${item.id})`:`openEvtModal(${item.id})`};selDay('${item.date}')">
      <div class="imp-num">${idx+1}</div>
      <div style="width:6px;height:24px;border-radius:3px;background:${p?p.border:ci.color};flex-shrink:0;"></div>
      <div class="imp-info">
        <div class="imp-date">${fmtDateKo(item.date)}${item.client?` · <span style="color:${p?p.text:'#888'};">${item.client}</span>`:''}</div>
        <div class="imp-title">${item.title}</div>
      </div>
      ${dBadge(diff)}
      <button class="star-btn" onclick="event.stopPropagation();toggleStar(${item.id},'${item.type}')" title="별표 해제" style="color:#F57F17;">★</button>
    </div>`;
  }).join('');
  listEl.style.display=impCollapsed?'none':'block';
}

function renderCalLegend(){
  /* 범례 */
  document.getElementById('cal-legend').innerHTML=
    CATS.map(c=>`<span style="display:inline-flex;align-items:center;gap:3px;background:${c.bg};border:0.5px solid ${c.color};border-radius:20px;padding:2px 8px;font-size:10px;color:${c.color};font-weight:600;"><i class="ti ${c.icon}" style="font-size:10px;"></i>${c.label}</span>`).join('');
  /* 업체 필터 바 */
  renderCalFilterBar();
  renderImpPanel();
}

function renderCalFilterBar(){
  /* 실제 활동/이벤트가 있는 업체만 + 전체 포함 */
  const clientsWithData=[...new Set([
    ...acts.map(a=>a.client).filter(Boolean),
    ...calEvents.map(e=>e.client).filter(Boolean)
  ])].sort();

  const bar=document.getElementById('cal-filter-inner');
  const allBtn=`<button class="cfilter-btn${calFilter==='ALL'?' active':''}" onclick="setCalFilter('ALL')" style="${calFilter==='ALL'?'background:var(--tp);color:var(--bp);border-color:var(--tp);':''}">
    <i class="ti ti-layout-grid" style="font-size:11px;"></i>통합 전체
  </button>`;

  const clientBtns=ALL_CLIENTS.map(name=>{
    const p=gcp(name);
    const hasData=clientsWithData.includes(name)||acts.some(a=>a.client===name)||calEvents.some(e=>e.client===name);
    const isActive=calFilter===name;
    const ini=name.replace(/[^A-Za-z가-힣]/g,'').slice(0,1)||name.slice(0,1);
    return `<button class="cfilter-btn${isActive?' active':''}" onclick="setCalFilter('${name.replace(/'/g,"\'")}')"
      style="${isActive?`background:${p.shades[1]};color:${p.text};border-color:${p.border};`:`opacity:${hasData?'1':'.45'};`}">
      <div class="cfilter-dot" style="background:${p.border};"></div>${name}
      ${hasData?`<span style="font-size:9px;background:${isActive?p.shades[2]:'var(--bs)'};border-radius:20px;padding:0 4px;">${acts.filter(a=>a.client===name).length}</span>`:''}
    </button>`;
  }).join('');

  bar.innerHTML=allBtn+clientBtns;
}

function setCalFilter(name){
  calFilter=name;
  renderCalFilterBar();
  renderCal();
  selDate=null;
  document.getElementById('dpanel').innerHTML='<div style="font-size:11px;color:var(--tt);text-align:center;padding:10px;">날짜를 선택하세요</div>';
}
function mCal(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){
  const filterLabel=calFilter==='ALL'?'통합 전체':calFilter;
  document.getElementById('callbl').textContent=`${calY}년 ${calM+1}월 — ${filterLabel}`;
  const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),tStr=now.toISOString().slice(0,10);
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayActs=calFilter==='ALL'?acts.filter(a=>a.date===ds):acts.filter(a=>a.date===ds&&(a.client===calFilter||a.client.includes(calFilter)||calFilter.includes(a.client)));
    const dayEvts=calFilter==='ALL'?calEvents.filter(e=>e.date===ds):calEvents.filter(e=>e.date===ds&&(!e.client||e.client===calFilter||e.client.includes(calFilter)||calFilter.includes(e.client)));
    const dow=(first+d-1)%7;
    const allItems=[...dayActs.map(a=>({type:'act',cat:a.type,id:a.id})),...dayEvts.map(e=>({type:'evt',cat:e.cat,id:e.id}))];
    const dots=allItems.slice(0,4).map(item=>{const ci=catInfo(item.cat);return `<div class="cdot" style="background:${ci.color};"></div>`;}).join('');
    const hasStarred=allItems.some(item=>(item.type==='act'&&starredIds.has('act:'+item.id))||(item.type==='evt'&&starredIds.has('evt:'+item.id)));
    html+=`<div class="cday${ds===tStr?' today':''}${ds===selDate?' sel':''}" onclick="selDay('${ds}')" style="${hasStarred?'background:linear-gradient(135deg,#FFFDE7 0%,var(--bp) 60%);':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="cnum${dow===0?' sun':''}">${d}</div>
        ${hasStarred?`<span style="font-size:8px;color:#F57F17;line-height:1;">★</span>`:''}
      </div>
      ${dots?`<div class="cdots">${dots}</div>`:''}
      ${allItems.length>4?`<div style="font-size:8px;color:var(--tt);text-align:right;">+${allItems.length-4}</div>`:''}
    </div>`;
  }
  document.getElementById('cdays').innerHTML=html;
  if(selDate)renderDayPanel(selDate);
}
function selDay(ds){selDate=ds;renderCal();renderDayPanel(ds);}
function renderDayPanel(ds){
  const el=document.getElementById('dpanel');
  const dayActs=calFilter==='ALL'?acts.filter(a=>a.date===ds):acts.filter(a=>a.date===ds&&(a.client===calFilter||a.client.includes(calFilter)||calFilter.includes(a.client)));
  const dayEvts=calFilter==='ALL'?calEvents.filter(e=>e.date===ds):calEvents.filter(e=>e.date===ds&&(!e.client||e.client===calFilter||e.client.includes(calFilter)||calFilter.includes(e.client)));
  const d=new Date(ds+'T00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const total=dayActs.length+dayEvts.length;
  const clientBadge=calFilter!=='ALL'?`<span style="font-size:9px;background:${gcp(calFilter).shades[0]};color:${gcp(calFilter).text};border:0.5px solid ${gcp(calFilter).border};border-radius:20px;padding:1px 6px;margin-left:4px;">${calFilter}</span>`:'';
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:11px;font-weight:600;">${d}${total?' · '+total+'건':''}${clientBadge}</span>
    <button onclick="openAddEventModal('${ds}')" style="background:#534AB7;color:#fff;border:none;border-radius:var(--rm);padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;"><i class="ti ti-plus" style="font-size:11px;"></i> 일정 추가</button>
  </div>`;
  if(!total){html+='<div style="font-size:11px;color:var(--tt);text-align:center;padding:10px;">이 날 활동이 없습니다.<br>일정 추가 버튼으로 등록해보세요.</div>';}
  /* 일정(캘린더 이벤트) */
  dayEvts.forEach(e=>{
    const ci=catInfo(e.cat);
    const linkedAct=e.actId?acts.find(a=>a.id===e.actId):null;
    html+=`<div style="display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:var(--rm);background:${ci.bg};border:0.5px solid ${ci.color};margin-bottom:5px;cursor:pointer;" onclick="${linkedAct&&linkedAct.minutes?`openMinModal(${linkedAct.id})`:`openEvtModal(${e.id})`}">
      <div style="width:8px;height:8px;border-radius:50%;background:${ci.color};flex-shrink:0;margin-top:3px;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="tag t-${e.cat}" style="margin-top:0;">${e.cat}</span>
          ${linkedAct&&linkedAct.minutes?`<span style="font-size:9px;background:#EAF3DE;color:#27500A;padding:1px 5px;border-radius:20px;"><i class="ti ti-file-text" style="font-size:9px;"></i> 회의록</span>`:''}
        </div>
        <div style="font-size:11px;font-weight:600;color:${ci.color};margin-top:2px;">${e.title}</div>
        <div style="font-size:10px;color:${ci.color};opacity:.75;">${e.user||''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <button onclick="event.stopPropagation();toggleStar(${e.id},'evt')" class="star-btn" style="color:${starredIds.has('evt:'+e.id)?'#F57F17':'var(--tt)'};" title="중요 표시">${starredIds.has('evt:'+e.id)?'★':'☆'}</button>
        <button onclick="event.stopPropagation();delEvt(${e.id})" style="background:none;border:none;font-size:12px;color:${ci.color};opacity:.5;padding:2px;"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  /* 영업 활동 */
  dayActs.forEach(a=>{
    const p=gcp(a.client);const ci=catInfo(a.type);
    html+=`<div style="display:flex;align-items:flex-start;gap:6px;padding:7px 9px;border-radius:var(--rm);background:${p.shades[0]};border:0.5px solid ${p.border};margin-bottom:5px;cursor:pointer;" onclick="${a.minutes?`openMinModal(${a.id})`:`openActModal(${a.id})`}">
      <div style="width:8px;height:8px;border-radius:50%;background:${p.border};flex-shrink:0;margin-top:3px;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="tag t-${a.type}" style="margin-top:0;">${a.type}</span>
          ${(a.mailImages&&a.mailImages.length)?`<span style="font-size:9px;background:#FAEEDA;color:#633806;padding:1px 5px;border-radius:20px;cursor:pointer;" onclick="event.stopPropagation();openActMailImages(${a.id})"><i class="ti ti-photo" style="font-size:9px;"></i> 사진 ${a.mailImages.length}장</span>`:''}
          ${a.minutes?`<span style="font-size:9px;background:#EAF3DE;color:#27500A;padding:1px 5px;border-radius:20px;"><i class="ti ti-file-text" style="font-size:9px;"></i> 회의록 탭하여 열기</span>`:''}
        </div>
        <div style="font-size:11px;font-weight:600;color:${p.text};margin-top:2px;">${a.client}</div>
        ${a.memo?`<div style="font-size:10px;color:${p.text};opacity:.75;">${a.memo.slice(0,30)}${a.memo.length>30?'...':''}</div>`:''}
        <div style="font-size:10px;color:${p.text};opacity:.65;">${a.user||''}</div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

/* ── ADD EVENT MODAL ── */
function openAddEventModal(ds){
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhdr">
      <div style="font-size:13px;font-weight:600;"><i class="ti ti-calendar-plus" style="font-size:12px;vertical-align:-1px;color:#534AB7;margin-right:4px;"></i>일정 추가</div>
      <button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody">
      <div class="fl"><label>날짜</label><input type="date" id="ev-date" value="${ds}"/></div>
      <div class="fl"><label>업체 (선택)</label>
        <select id="ev-client">
          <option value="">-- 업체 선택 (선택사항) --</option>
          ${ALL_CLIENTS.map(n=>`<option value="${n}" ${calFilter!=='ALL'&&calFilter===n?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>
      <div class="fl"><label>카테고리</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;" id="ev-cats">
          ${CATS.map((c,i)=>`<div onclick="selectEvCat(this,'${c.key}')" data-cat="${c.key}" style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;background:${c.bg};border:1.5px solid ${i===0?c.color:'transparent'};cursor:pointer;font-size:12px;font-weight:600;color:${c.color};" class="ev-cat-btn${i===0?' evcsel':''}">
            <i class="ti ${c.icon}" style="font-size:13px;"></i>${c.label}
          </div>`).join('')}
        </div>
      </div>
      <div class="fl"><label>제목 / 내용</label><input type="text" id="ev-title" placeholder="예) Samsung SDI 중식 미팅"/></div>
      <div class="fl"><label>메모 (선택)</label><textarea id="ev-memo" placeholder="추가 메모..." style="height:48px;"></textarea></div>
      <button class="pbtn" onclick="addEvent('${ds}')">일정 저장</button>
    </div>
  </div></div>`;
  /* 기본 첫 번째 선택 */
  window._evCat=CATS[0].key;
}
function selectEvCat(el,key){
  window._evCat=key;
  document.querySelectorAll('.ev-cat-btn').forEach(b=>{
    const ci=catInfo(b.dataset.cat);
    b.style.border=b.dataset.cat===key?`1.5px solid ${ci.color}`:'1.5px solid transparent';
  });
}
function addEvent(defaultDs){
  const date=document.getElementById('ev-date').value||defaultDs;
  const title=document.getElementById('ev-title').value.trim();
  const memo=document.getElementById('ev-memo').value.trim();
  const cat=window._evCat||'일정';
  const evClient=document.getElementById('ev-client')?document.getElementById('ev-client').value:'';
  if(!title){toast('제목을 입력해 주세요');return;}
  const u=curUser();
  calEvents.push({id:Date.now(),date,cat,title:title+(memo?' — '+memo:''),user:udisplay(u),userColor:u.color,actId:null,client:evClient||null});
  saveCE();closeModal();renderCal();selDay(date);toast('일정이 추가됐습니다 ✓');
}
function openEvtModal(eid){
  const e=calEvents.find(x=>x.id===eid);if(!e)return;
  const ci=catInfo(e.cat);
  document.getElementById('modal-area').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhdr" style="background:${ci.bg};">
      <div><div style="font-size:12px;font-weight:600;color:${ci.color};">${e.title}</div><div style="font-size:10px;color:${ci.color};opacity:.75;">${e.date} · ${e.user||''}</div></div>
      <button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody">
      <div style="display:flex;align-items:center;gap:8px;padding:10px;background:${ci.bg};border-radius:var(--rm);margin-bottom:10px;">
        <i class="ti ${ci.icon}" style="font-size:20px;color:${ci.color};"></i>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:${ci.color};">${ci.label}</div>
          <div style="font-size:11px;color:${ci.color};opacity:.75;">${e.date}${e.client?` · ${e.client}`:''}</div>
        </div>
      </div>
      <button onclick="delEvt(${e.id});closeModal();renderCal();if(selDate)renderDayPanel(selDate);" class="pbtn2" style="color:#A32D2D;border-color:#F09595;"><i class="ti ti-trash" style="font-size:12px;vertical-align:-1px;"></i> 일정 삭제</button>
    </div>
  </div></div>`;
}
function delEvt(eid){calEvents=calEvents.filter(e=>e.id!==eid);saveCE();renderCal();if(selDate)renderDayPanel(selDate);toast('삭제됐습니다');}

/* ── STATS ── */
function renderStats(){
  const total=acts.length,ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisMonth=acts.filter(a=>a.date&&a.date.startsWith(ym)).length;
  const totalCmts=acts.reduce((s,a)=>s+(a.comments||[]).length,0);
  const totalMins=acts.filter(a=>a.minutes).length;
  const totalMailImgs=acts.reduce((s,a)=>s+(a.mailImages?a.mailImages.length:0),0);
  document.getElementById('sgrid').innerHTML=`
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">전체 활동</div><div style="font-size:20px;font-weight:600;">${total}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">이번 달</div><div style="font-size:20px;font-weight:600;">${thisMonth}</div></div>
    <div class="scard"><div style="font-size:10px;color:var(--ts);margin-bottom:2px;">팀 댓글</div><div style="font-size:20px;font-weight:600;">${totalCmts}</div></div>
    <div class="scard" style="background:#EAF3DE;"><div style="font-size:10px;color:#27500A;margin-bottom:2px;"><i class="ti ti-file-text" style="font-size:10px;"></i> 회의록</div><div style="font-size:20px;font-weight:600;color:#1B5E20;">${totalMins}</div></div>
    <div class="scard" style="background:#FAEEDA;"><div style="font-size:10px;color:#633806;margin-bottom:2px;"><i class="ti ti-photo" style="font-size:10px;"></i> 메일사진</div><div style="font-size:20px;font-weight:600;color:#BA7517;">${totalMailImgs}</div></div>`;
  const cc={};acts.forEach(a=>{cc[a.client]=(cc[a.client]||0)+1;});
  const sc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8);const maxC=sc.length?sc[0][1]:1;
  document.getElementById('cbar').innerHTML=sc.map(([n,cnt])=>{const p=gcp(n);return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="font-size:10px;color:var(--ts);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</span><div style="flex:1;height:7px;background:var(--bs);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxC*100)}%;height:100%;background:${p.border};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--ts);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--tt);">활동 없음</div>';
  const uc={};acts.forEach(a=>{uc[a.user||'?']=(uc[a.user||'?']||0)+1;});
  const su=Object.entries(uc).sort((a,b)=>b[1]-a[1]);const maxU=su.length?su[0][1]:1;
  document.getElementById('ubar').innerHTML=su.map(([n,cnt])=>{const u=getUserByName(n);return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><div style="width:14px;height:14px;border-radius:50%;background:${u.bg};border:0.5px solid ${u.color};flex-shrink:0;"></div><span style="font-size:10px;color:var(--ts);width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n}</span><div style="flex:1;height:7px;background:var(--bs);border-radius:3px;overflow:hidden;"><div style="width:${Math.round(cnt/maxU*100)}%;height:100%;background:${u.color};border-radius:3px;"></div></div><span style="font-size:10px;color:var(--ts);width:14px;text-align:right;">${cnt}</span></div>`;}).join('')||'<div style="font-size:11px;color:var(--tt);">활동 없음</div>';
}

/* ── NAV ── */
function go(tab){
  const tabs=['feed','log','clients','cal','stats'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',tabs[i]===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  const p=document.getElementById('pane-'+tab);if(p)p.classList.add('on');
  closeModal();
  if(tab==='feed')renderFeed();
  if(tab==='clients')renderClients();
  if(tab==='cal'){renderCalLegend();renderCal();renderImpPanel();}
  if(tab==='stats')renderStats();
}
function closeModal(){document.getElementById('modal-area').innerHTML='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* INIT */
renderFeed();renderCalLegend();renderCal();
</script>
</body>
</html>
